<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />

<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --md-primary: #5b2c83;
  --md-primary-dark: #3d1c5c;
  --md-primary-light: #f1e9f8;
  --md-gradient: linear-gradient(135deg, #6a2c91 0%, #3d1c5c 100%);
  --md-on-primary: #fff;
  --md-surface: #fff;
  --md-surface-variant: #f4f0f8;
  --md-background: #f8f6fb;
  --md-outline: #e0d5eb;
  --md-on-surface: #202124;
  --md-on-surface-variant: #5f6368;
  --md-error: #d93025;
  --md-success: #1e8e3e;
  --md-warning: #f9ab00;
  --md-shadow-1: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24);
  --md-shadow-2: 0 3px 6px rgba(0,0,0,0.15), 0 2px 4px rgba(0,0,0,0.12);
  --md-shadow-3: 0 10px 20px rgba(0,0,0,0.15), 0 3px 6px rgba(0,0,0,0.10);
  --md-radius: 12px;
  --md-radius-full: 50px;
  --topbar-h: 64px;
  --chipbar-h: 0px;
  --statsbar-h: 92px;
  --catbar-h: 48px;
  --nav-h: 64px;
  --font-display: 'Google Sans', 'Roboto', system-ui, sans-serif;
  --font-body: 'Roboto', system-ui, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; width: 100%; overflow: hidden; font-family: var(--font-body); color: var(--md-on-surface); background: var(--md-background); -webkit-tap-highlight-color: transparent; }
button { font-family: inherit; cursor: pointer; }

/* ── TOP APP BAR ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; height: var(--topbar-h);
  background: var(--md-gradient); z-index: 200;
  display: flex; align-items: center; padding: 0 4px 0 16px;
  border-bottom: 1px solid var(--md-outline);
  box-shadow: var(--md-shadow-2);
}
.topbar-title {
  flex: 1; font-family: var(--font-display); font-size: 1.1rem; font-weight: 700;
  color: #fff; letter-spacing: -0.01em;
  display: flex; flex-direction: column;
}
.topbar-title span { font-size: 0.72rem; font-weight: 400; color: rgba(255,255,255,0.75); margin-top: 1px; }
.topbar-actions { display: flex; align-items: center; gap: 4px; }
.icon-btn {
  width: 44px; height: 44px; border-radius: 50%; border: none; background: transparent;
  display: flex; align-items: center; justify-content: center; font-size: 20px;
  color: rgba(255,255,255,0.9); transition: background .15s ease;
}
.icon-btn:active { background: rgba(255,255,255,0.15); }
.icon-btn.primary { color: #fff; }
.icon-btn.active-edit { background: #fce8e6; color: var(--md-error); }

/* ── CHIP BAR (Abas) ── */
.chipbar {
  position: fixed; top: var(--topbar-h); left: 0; right: 0; height: var(--chipbar-h);
  background: var(--md-surface); z-index: 199;
  display: flex; align-items: center; gap: 8px; padding: 0 12px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  border-bottom: 1px solid var(--md-outline);
  scrollbar-width: none;
}
.chipbar::-webkit-scrollbar { display: none; }
.layer-chip {
  flex-shrink: 0; display: flex; align-items: center; gap: 6px;
  height: 32px; padding: 0 14px; border-radius: 8px; border: none;
  background: transparent; color: var(--md-on-surface-variant);
  font-family: var(--font-display); font-size: 0.84rem; font-weight: 500;
  transition: background .15s, color .15s; white-space: nowrap;
  position: relative;
}
.layer-chip::after {
  content: ''; position: absolute; bottom: -8px; left: 0; right: 0; height: 3px;
  border-radius: 3px 3px 0 0; background: transparent; transition: background .15s;
}
.layer-chip.active { color: var(--md-primary); background: var(--md-primary-light); }
.layer-chip.active::after { background: var(--md-primary); }
.chip-count {
  background: var(--md-outline); color: var(--md-on-surface-variant);
  border-radius: 10px; padding: 1px 7px; font-size: 0.7rem; font-weight: 700;
}
.layer-chip.active .chip-count { background: var(--md-primary); color: white; }

/* ── STATS BAR (cards estilo app) ── */
.statsbar {
  position: fixed; top: calc(var(--topbar-h) + var(--chipbar-h)); left: 0; right: 0;
  height: var(--statsbar-h); background: var(--md-surface); z-index: 198;
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
  overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
  border-bottom: 1px solid var(--md-outline);
}
.statsbar::-webkit-scrollbar { display: none; }
.stat-card {
  flex-shrink: 0; width: 84px; height: 84px; background: var(--md-surface);
  border: 1px solid var(--md-outline); border-radius: var(--md-radius);
  padding: 10px 8px; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 5px; text-align: center;
  box-shadow: var(--md-shadow-1); transition: transform .12s ease, border-color .12s ease;
}
.stat-card:active { transform: scale(0.96); }
.stat-card.active { border-color: var(--md-primary); background: var(--md-primary-light); }
.stat-icon {
  width: 26px; height: 26px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-size: 13px;
}
.stat-value { font-family: var(--font-display); font-weight: 700; font-size: 1.25rem; line-height: 1.1; color: var(--md-on-surface); }
.stat-label { font-size: 0.68rem; color: var(--md-on-surface-variant); white-space: nowrap; }

/* ── CATEGORY BAR ── */
.catbar {
  position: fixed; top: calc(var(--topbar-h) + var(--chipbar-h) + var(--statsbar-h)); left: 0; right: 0;
  height: 0; overflow: hidden; background: var(--md-surface-variant); z-index: 198;
  transition: height .2s ease;
}
body.show-catbar .catbar { height: var(--catbar-h); }
body.show-catbar #map { top: calc(var(--topbar-h) + var(--chipbar-h) + var(--statsbar-h) + var(--catbar-h)) !important; }
body.show-catbar .list-view { top: calc(var(--topbar-h) + var(--chipbar-h) + var(--statsbar-h) + var(--catbar-h)) !important; }
.catbar-inner {
  height: var(--catbar-h); display: flex; align-items: center; gap: 6px;
  padding: 0 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.catbar-inner::-webkit-scrollbar { display: none; }
.cat-chip {
  flex-shrink: 0; display: flex; align-items: center; gap: 5px;
  height: 28px; padding: 0 12px; border-radius: 8px; border: none;
  background: var(--md-surface); color: var(--md-on-surface-variant);
  font-size: 0.78rem; font-weight: 500; font-family: var(--font-body);
  box-shadow: var(--md-shadow-1); white-space: nowrap; transition: all .15s;
}
.cat-chip.active { background: var(--md-primary); color: white; }
.cat-chip .count { opacity: 0.75; font-size: 0.72rem; }
.cat-chip.active .count { opacity: 0.9; }
.mode-chip { border: 1.5px solid var(--md-outline); box-shadow: none; }
.mode-chip.active { border-color: var(--md-primary); }
.catbar-divider { width: 1px; height: 22px; background: var(--md-outline); flex-shrink: 0; margin: 0 2px; }

/* ── MAP ── */
#map {
  position: fixed; top: calc(var(--topbar-h) + var(--chipbar-h) + var(--statsbar-h)); left: 0; right: 0;
  bottom: var(--nav-h); background: var(--md-background);
}

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h);
  background: var(--md-gradient); z-index: 200; display: flex; align-items: stretch;
  border-top: 1px solid rgba(255,255,255,0.1); box-shadow: 0 -2px 8px rgba(0,0,0,0.25);
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 3px; border: none; background: transparent;
  color: rgba(255,255,255,0.65); font-size: 0.68rem; font-weight: 500;
  font-family: var(--font-display); padding: 6px 4px; transition: color .15s;
}
.nav-item .nav-icon {
  width: 40px; height: 26px; border-radius: 13px; display: flex; align-items: center;
  justify-content: center; font-size: 18px; transition: background .15s;
}
.nav-item.active { color: #fff; }
.nav-item.active .nav-icon { background: rgba(255,255,255,0.18); }

/* ── FAB ── */
.fab {
  position: fixed; bottom: calc(var(--nav-h) + 16px); right: 16px; z-index: 201;
  width: 56px; height: 56px; border-radius: 16px; border: none;
  background: var(--md-gradient); color: white; font-size: 24px;
  box-shadow: var(--md-shadow-3); display: none; align-items: center; justify-content: center;
  transition: transform .15s, box-shadow .15s;
}
.fab.show { display: flex; }
.fab:active { transform: scale(0.95); box-shadow: var(--md-shadow-2); }

/* ── LOCATE BTN ── */
.locate-fab {
  position: fixed; bottom: calc(var(--nav-h) + 16px); right: calc(56px + 16px + 12px); z-index: 201;
  width: 44px; height: 44px; border-radius: 50%; border: none;
  background: var(--md-surface); color: var(--md-primary);
  box-shadow: var(--md-shadow-2); display: flex; align-items: center; justify-content: center;
  font-size: 20px; transition: box-shadow .15s;
}
.locate-fab:active { box-shadow: var(--md-shadow-1); }

/* ── HINT TOAST ── */
.hint-toast {
  position: fixed; top: calc(var(--topbar-h) + var(--chipbar-h) + 12px); left: 50%;
  transform: translateX(-50%); z-index: 205;
  background: #3c4043; color: white; padding: 8px 18px; border-radius: 20px;
  font-size: 0.78rem; font-weight: 500; box-shadow: var(--md-shadow-3);
  display: none; max-width: 90vw; text-align: center;
  font-family: var(--font-body);
}
.hint-toast.show { display: block; }
body.show-catbar .hint-toast { top: calc(var(--topbar-h) + var(--chipbar-h) + var(--catbar-h) + 12px); }

/* ── DRAW TOOLBAR ── */
.draw-toolbar {
  position: fixed; bottom: calc(var(--nav-h) + 80px); left: 50%; transform: translateX(-50%);
  z-index: 205; display: none; gap: 8px; flex-wrap: wrap; justify-content: center; max-width: 94vw;
}
.draw-toolbar.show { display: flex; }
.draw-btn {
  height: 36px; padding: 0 16px; border: none; border-radius: 18px;
  font-weight: 700; font-size: 0.82rem; font-family: var(--font-display);
  box-shadow: var(--md-shadow-2); white-space: nowrap;
}
.btn-finalizar { background: var(--md-success); color: white; }
.btn-desfazer { background: var(--md-warning); color: #202124; }
.btn-cancelar-draw { background: var(--md-error); color: white; }

/* ── LEGEND CARD ── */
.legend {
  position: fixed; bottom: calc(var(--nav-h) + 12px); left: 12px; z-index: 190;
  background: var(--md-surface); border-radius: var(--md-radius);
  box-shadow: var(--md-shadow-2); padding: 10px 14px;
  font-size: 0.73rem; line-height: 1.75; max-width: 46vw;
  max-height: 35vh; overflow-y: auto; border: 1px solid var(--md-outline);
}
.legend-title { font-family: var(--font-display); font-weight: 700; font-size: 0.76rem; color: var(--md-on-surface); margin-bottom: 4px; display: block; }
.legend .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 6px; vertical-align: middle; border: 1px solid white; box-shadow: 0 0 0 1px rgba(0,0,0,0.15); }

/* ── LIST VIEW ── */
.list-view {
  position: fixed; top: calc(var(--topbar-h) + var(--chipbar-h) + var(--statsbar-h)); left: 0; right: 0;
  bottom: var(--nav-h); background: var(--md-background);
  overflow-y: auto; padding: 12px 12px 24px; display: none;
}
.list-view.show { display: block; }
.list-add-bar { margin-bottom: 12px; }
.btn-add-primary {
  width: 100%; background: var(--md-gradient); color: white; border: none;
  border-radius: var(--md-radius); padding: 14px; font-weight: 700;
  font-family: var(--font-display); font-size: 0.9rem;
  box-shadow: var(--md-shadow-1); display: flex; align-items: center;
  justify-content: center; gap: 8px; letter-spacing: .01em;
}
.btn-add-primary:active { filter: brightness(0.92); }

.list-search-wrap { position: relative; margin-bottom: 16px; }
.list-search-wrap .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 18px; color: var(--md-on-surface-variant); pointer-events: none; }
.list-search {
  width: 100%; padding: 12px 14px 12px 44px; border-radius: var(--md-radius-full);
  border: 1.5px solid var(--md-outline); font-size: 0.9rem;
  background: var(--md-surface); font-family: var(--font-body);
  color: var(--md-on-surface);
}
.list-search:focus { outline: none; border-color: var(--md-primary); box-shadow: 0 0 0 3px var(--md-primary-light); }

/* ── CARDS ── */
.card {
  background: var(--md-surface); border-radius: var(--md-radius); padding: 14px 16px;
  margin-bottom: 10px; box-shadow: var(--md-shadow-1);
  border: 1px solid var(--md-outline); border-left: 4px solid #dadce0;
  transition: box-shadow .15s;
}
.card.dirty { border-left-color: var(--md-warning); }
.card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.card-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; overflow: hidden; }
.card-avatar img { width: 100%; height: 100%; object-fit: cover; }
.photo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 2px; }
.photo-thumb { width: 64px; height: 64px; border-radius: 10px; object-fit: cover; border: 1px solid var(--md-outline); flex-shrink: 0; }
.photo-placeholder { width: 64px; height: 64px; border-radius: 10px; background: var(--md-surface-variant); display: flex; align-items: center; justify-content: center; font-size: 22px; color: var(--md-on-surface-variant); flex-shrink: 0; border: 1.5px dashed var(--md-outline); }
.photo-actions { display: flex; flex-direction: column; gap: 6px; flex: 1; }
.btn-photo { background: var(--md-primary-light); color: var(--md-primary-dark); }
.btn-photo-remove { background: #fce8e6; color: var(--md-error); }
.popup-photo { width: 100%; max-height: 130px; object-fit: cover; border-radius: 8px; margin-bottom: 6px; display: block; }
.btn-streetview { background: var(--md-surface-variant); color: var(--md-on-surface-variant); border: 1px solid var(--md-outline); }
.streetview-box { margin-top: 10px; border-radius: 10px; overflow: hidden; border: 1px solid var(--md-outline); }
.streetview-box iframe { width: 100%; height: 200px; border: 0; display: block; }
.streetview-note { font-size: 0.68rem; color: var(--md-on-surface-variant); padding: 6px 8px; background: var(--md-surface-variant); }
.card-name { font-family: var(--font-display); font-weight: 700; font-size: 0.9rem; color: var(--md-on-surface); }
.card-sub { font-size: 0.75rem; color: var(--md-on-surface-variant); margin-top: 1px; }
.card-label {
  font-size: 0.66rem; text-transform: uppercase; letter-spacing: .06em;
  color: var(--md-on-surface-variant); font-weight: 700; margin: 10px 0 4px;
}
.card-row { display: flex; align-items: center; gap: 8px; }
.card input, .card select {
  flex: 1; padding: 10px 12px; border: 1.5px solid var(--md-outline); border-radius: 8px;
  font-size: 0.88rem; background: var(--md-surface-variant); font-family: var(--font-body);
  color: var(--md-on-surface);
}
.card input:focus, .card select:focus {
  background: var(--md-surface); border-color: var(--md-primary); outline: none;
  box-shadow: 0 0 0 3px var(--md-primary-light);
}
.geo-status { font-size: 0.7rem; margin: 2px 0 4px; min-height: 14px; font-weight: 500; }
.geo-status.ok { color: var(--md-success); }
.geo-status.fail { color: var(--md-error); }

.card-actions { display: flex; gap: 8px; margin-top: 14px; }
.btn-action {
  flex: 1; border: none; border-radius: 8px; padding: 9px 10px;
  font-size: 0.78rem; font-weight: 700; font-family: var(--font-display);
  display: flex; align-items: center; justify-content: center; gap: 5px;
  transition: filter .12s; white-space: nowrap;
}
.btn-action:active { filter: brightness(0.92); }
.btn-save-card { background: var(--md-gradient); color: white; opacity: 0.35; }
.btn-save-card:not(:disabled) { opacity: 1; }
.btn-locate { background: var(--md-primary-light); color: var(--md-primary-dark); }
.btn-remove { background: #fce8e6; color: var(--md-error); }
.btn-cor-auto { background: var(--md-surface-variant); color: var(--md-on-surface-variant); border: 1px solid var(--md-outline); border-radius: 8px; padding: 8px 10px; font-size: 0.76rem; font-weight: 600; flex-shrink: 0; }

/* ── CONTROLE DE CARTAS ── */
.cartas-total { text-transform: none; letter-spacing: 0; color: var(--md-primary); font-weight: 700; margin-left: 6px; font-size: 0.72rem; }
.cartas-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
.cartas-item { display: flex; align-items: center; justify-content: space-between; background: var(--md-surface-variant); border-radius: 8px; padding: 7px 6px 7px 12px; }
.cartas-item-info { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--md-on-surface); }
.cartas-item-qtd { font-weight: 700; color: var(--md-primary-dark); background: var(--md-primary-light); border-radius: 10px; padding: 1px 9px; font-size: 0.74rem; }
.cartas-item-remove { border: none; background: transparent; color: var(--md-on-surface-variant); font-size: 0.95rem; padding: 6px 10px; border-radius: 6px; line-height: 1; }
.cartas-item-remove:active { background: #fce8e6; color: var(--md-error); }
.cartas-empty { font-size: 0.78rem; color: var(--md-on-surface-variant); padding: 4px 0 8px; }
.cartas-add-row input[type="date"] { flex: 1.3; }
.cartas-add-row input[type="number"] { flex: 0.7; min-width: 0; }
.btn-cartas-add { flex: 0 0 auto; padding: 9px 14px; background: var(--md-primary-light); color: var(--md-primary-dark); }

.empty-msg {
  text-align: center; color: var(--md-on-surface-variant); font-size: 0.9rem;
  margin-top: 60px; font-weight: 400; line-height: 1.6;
}
.empty-msg strong { display: block; font-size: 1.1rem; margin-bottom: 6px; }

/* ── SEARCH OVERLAY ── */
.search-overlay {
  position: fixed; inset: 0; z-index: 300; background: var(--md-background);
  display: none; flex-direction: column;
}
.search-overlay.show { display: flex; }
.search-overlay-header {
  display: flex; align-items: center; gap: 8px; padding: 10px 8px 10px 4px;
  background: var(--md-surface); border-bottom: 1px solid var(--md-outline);
  box-shadow: var(--md-shadow-1); flex-shrink: 0;
}
.search-overlay-input {
  flex: 1; display: flex; align-items: center; background: var(--md-surface-variant);
  border-radius: var(--md-radius-full); padding: 0 14px; height: 44px; gap: 8px;
}
.search-overlay-input input {
  flex: 1; border: none; background: transparent; font-size: 0.92rem; font-family: var(--font-body); color: var(--md-on-surface);
}
.search-overlay-input input:focus { outline: none; }
.search-overlay-input .s-icon { font-size: 18px; color: var(--md-on-surface-variant); }
.search-overlay-results { flex: 1; overflow-y: auto; padding: 8px 12px; }
.search-result {
  background: var(--md-surface); border-radius: var(--md-radius); padding: 12px 14px;
  margin-bottom: 8px; display: flex; align-items: center; gap: 12px;
  box-shadow: var(--md-shadow-1); cursor: pointer; border: 1px solid var(--md-outline);
  transition: box-shadow .12s;
}
.search-result:active { box-shadow: var(--md-shadow-2); }
.search-badge {
  width: 40px; height: 40px; border-radius: 50%; background: var(--md-primary-light);
  display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
}
.search-info b { display: block; font-size: 0.88rem; font-weight: 600; color: var(--md-on-surface); }
.search-info span { font-size: 0.75rem; color: var(--md-on-surface-variant); }

/* ── MARKER STYLES ── */
.saida-pin { width: 28px; height: 28px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); border: 2.5px solid white; box-shadow: 0 3px 8px rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; }
.saida-pin span { transform: rotate(45deg); color: white; font-weight: 800; font-size: 12px; font-family: var(--font-display); }
.quadra-label { background: rgba(255,255,255,0.95); border-radius: 6px; padding: 2px 8px; font-weight: 800; font-size: 0.72rem; box-shadow: var(--md-shadow-1); white-space: nowrap; transform: translate(-50%, -50%); color: var(--md-on-surface); font-family: var(--font-display); }

/* ── POPUP ── */
.popup-edit { font-family: var(--font-body); min-width: 220px; }
.popup-edit b { font-family: var(--font-display); color: var(--md-on-surface); display: block; margin-bottom: 8px; font-size: 0.92rem; }
.popup-edit input, .popup-edit select {
  width: 100%; padding: 8px 10px; margin: 4px 0; border: 1.5px solid var(--md-outline);
  border-radius: 8px; font-size: 0.85rem; font-family: var(--font-body); color: var(--md-on-surface);
}
.popup-edit input:focus, .popup-edit select:focus { outline: none; border-color: var(--md-primary); }
.popup-edit .popup-actions { display: flex; gap: 6px; margin-top: 8px; }
.popup-edit button {
  flex: 1; padding: 8px 10px; border: none; border-radius: 8px; font-size: 0.8rem;
  font-weight: 700; font-family: var(--font-display);
}
.btn-save { background: var(--md-success); color: white; }
.btn-del { background: var(--md-error); color: white; }

/* ── SECTION HEADER in list ── */
.section-header {
  font-family: var(--font-display); font-size: 0.76rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .07em; color: var(--md-on-surface-variant);
  padding: 4px 2px 8px; margin-top: 4px;
}

/* ── SNACKBAR ── */
.snackbar {
  position: fixed; bottom: calc(var(--nav-h) + 12px); left: 50%; transform: translateX(-50%);
  background: #3c4043; color: white; padding: 10px 20px; border-radius: 8px;
  font-size: 0.84rem; font-weight: 500; box-shadow: var(--md-shadow-3);
  z-index: 500; display: none; white-space: nowrap;
}
.snackbar.show { display: block; animation: snackIn .2s ease; }
@keyframes snackIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
</style>
</head>

}

function saveGeoCache() { try { localStorage.setItem(GEO_STORAGE, JSON.stringify(geoCache)); } catch(e) {} }
async function geocode(addr) {
  if (!addr || !addr.trim()) return null;
  const key = addr.trim().toLowerCase();
  if (geoCache[key] !== undefined) return geoCache[key];
  try {
    const url = `https://api.opencagedata.com/geocode/v1/json?q=${encodeURIComponent(addr)}&key=${GEO_API_KEY}&language=pt&countrycode=br&limit=1`;
    const r = await fetch(url); const data = await r.json();
    const result = (data.results && data.results[0]) ? { lat: data.results[0].geometry.lat, lng: data.results[0].geometry.lng } : null;
    geoCache[key] = result; saveGeoCache(); return result;
  } catch(e) { return null; }
}
async function reverseGeocode(lat, lng) {
  const key = 'rev:' + lat.toFixed(6) + ',' + lng.toFixed(6);
  if (geoCache[key] !== undefined) return geoCache[key];
  try {
    const url = `https://api.opencagedata.com/geocode/v1/json?q=${lat}+${lng}&key=${GEO_API_KEY}&language=pt&countrycode=br&limit=1`;
    const r = await fetch(url); const data = await r.json();
    const result = (data.results && data.results[0]) ? data.results[0].formatted : null;
    geoCache[key] = result; saveGeoCache(); return result;
  } catch(e) { return null; }
}

function compressImage(file, maxDim = 640, quality = 0.7) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = () => { img.onload = () => {
      let w = img.width, h = img.height;
      if (w > h && w > maxDim) { h = Math.round(h * maxDim / w); w = maxDim; }
      else if (h >= w && h > maxDim) { w = Math.round(w * maxDim / h); h = maxDim; }
      const canvas = document.createElement('canvas'); canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    }; img.onerror = reject; img.src = reader.result; };
    reader.onerror = reject; reader.readAsDataURL(file);
  });
}

function wirePhotoBlock(card, item, rerenderFn) {

// ── CONTROLE DE CARTAS (condomínios) ──
function cartasListHTML(c) {
  const arr = c.cartas || [];
  if (!arr.length) return '<div class="cartas-empty">Nenhum registro ainda</div>';
  return arr.slice().sort((a,b)=> b.data.localeCompare(a.data)).map(r=>{
    const [y,m,d] = r.data.split('-');
    return `<div class="cartas-item"><div class="cartas-item-info"><span>📅 ${d}/${m}/${y}</span><span class="cartas-item-qtd">${r.qtd} carta${r.qtd==1?'':'s'}</span></div><button type="button" class="cartas-item-remove" data-id="${r.id}">🗑</button></div>`;
  }).join('');
}
function cartasBlockHTML(c) {
  const total = (c.cartas || []).reduce((s,r)=> s + (r.qtd||0), 0);
  const today = new Date().toISOString().slice(0,10);
  return `<div class="card-label">📇 Controle de cartas${total ? `<span class="cartas-total">${total} no total</span>` : ''}</div><div class="cartas-list" data-cartas-list>${cartasListHTML(c)}</div><div class="card-row cartas-add-row"><input type="date" class="cartas-input-data" value="${today}"><input type="number" min="1" class="cartas-input-qtd" placeholder="Qtd" value="1"><button type="button" class="btn-action btn-cartas-add">＋ Add</button></div>`;
}
function wireCartasBlock(card, c, rerenderFn) {
  const addBtn = card.querySelector('.btn-cartas-add');
  if (addBtn) addBtn.onclick = () => {
    const dataInp = card.querySelector('.cartas-input-data');
    const qtdInp = card.querySelector('.cartas-input-qtd');
    const data = dataInp.value;
    const qtd = parseInt(qtdInp.value, 10);
    if (!data) { showSnack('❌ Escolha uma data'); return; }
    if (!qtd || qtd < 1) { showSnack('❌ Informe a quantidade'); return; }
    if (!c.cartas) c.cartas = [];
    c.cartas.push({ id: 'ct'+Date.now()+Math.random().toString(36).slice(2,6), data, qtd });
    rerenderFn(); renderList(); showSnack('✓ Registro adicionado');
  };
  card.querySelectorAll('.cartas-item-remove').forEach(btn=>{
    btn.onclick = () => {
      const id = btn.dataset.id;
      c.cartas = (c.cartas || []).filter(r => r.id !== id);
      rerenderFn(); renderList(); showSnack('🗑 Registro removido');
    };
  });
}

// ── RENDER LAYERS ──
function renderGrupos() {
  layerGroups.grupos.clearLayers();
  saidasData.forEach(s => {
    let lat = s.lat, lng = s.lng; if (s.offset) { lat += s.offset[0]; lng += s.offset[1]; }
    const marker = L.marker([lat,lng], { icon: makeDivIcon(s.cor, s.grupo[0]), draggable: editMode });
    marker.bindPopup(editMode ? editSaidaPopup(marker,s) : `${s.foto?`<img src="${s.foto}" class="popup-photo">`:''}<b>Grupo ${s.grupo}</b><br>Saída: ${s.nome}${s.endereco?'<br><small style="color:#5f6368">'+s.endereco+'</small>':''}`);
    marker.on('dragend', e => { const p=e.target.getLatLng(); s.lat=p.lat; s.lng=p.lng; delete s.offset; });
    marker.addTo(layerGroups.grupos); s._marker = marker;
  });
  document.getElementById('cnt-grupos').textContent = saidasData.length;
  document.getElementById('stat-grupos').textContent = saidasData.length; saveState();
}
function renderComercios() {
  layerGroups.comercios.clearLayers();
  const items = activeCategoryFilter ? comerciosData.filter(c=>c.categoria===activeCategoryFilter) : comerciosData;
  items.forEach(c => {
    const marker = L.marker([c.lat,c.lng], { icon: makeDotIcon(c.cor||'#868e96'), draggable: editMode });
    marker.bindPopup(editMode ? editComercioPopup(marker,c) : `${c.foto?`<img src="${c.foto}" class="popup-photo">`:''}<b>${c.nome}</b><br>${c.categoria}<br><small style="color:#5f6368">${c.endereco}</small>`);
    marker.on('dragend', e => { const p=e.target.getLatLng(); c.lat=p.lat; c.lng=p.lng; });
    marker.addTo(layerGroups.comercios); c._marker = marker;
  });
  document.getElementById('cnt-comercios').textContent = comerciosData.length;
  document.getElementById('stat-comercios').textContent = comerciosData.length; saveState();
}
function renderCondominios() {
  layerGroups.condominios.clearLayers();
  condominiosData.forEach(c => {
    const marker = L.marker([c.lat,c.lng], { icon: makeDotIcon(c.cor||'#364fc7'), draggable: editMode });
    marker.bindPopup(editMode ? editCondominioPopup(marker,c) : `${c.foto?`<img src="${c.foto}" class="popup-photo">`:''}<b>${c.nome}</b><br>Condomínio/Prédio<br><small style="color:#5f6368">${c.endereco}</small>`);
    marker.on('dragend', e => { const p=e.target.getLatLng(); c.lat=p.lat; c.lng=p.lng; });
    marker.addTo(layerGroups.condominios); c._marker = marker;
  });
  document.getElementById('cnt-condominios').textContent = condominiosData.length;
  document.getElementById('stat-condominios').textContent = condominiosData.length; saveState();
}
function renderPublicadores() {
  layerGroups.publicadores.clearLayers();
  const items = activeGroupFilter ? publicadoresData.filter(p=>p.grupo===activeGroupFilter) : publicadoresData;
  items.forEach(p => {
    const cor = groupColors[p.grupo] || '#868e96';
    const marker = L.marker([p.lat,p.lng], { icon: makeDotIcon(cor), draggable: editMode });
    marker.bindPopup(editMode ? editPublicadorPopup(marker,p) : `${p.foto?`<img src="${p.foto}" class="popup-photo">`:''}<b>${p.membros.join(', ')}</b><br>Grupo: ${p.grupo}${p.endereco?'<br><small style="color:#5f6368">'+p.endereco+'</small>':''}`);
    marker.on('dragend', e => { const pos=e.target.getLatLng(); p.lat=pos.lat; p.lng=pos.lng; });
    marker.addTo(layerGroups.publicadores); p._marker = marker;
  });
  document.getElementById('cnt-publicadores').textContent = (activeGroupFilter?items.length+'/':'')+publicadoresData.length;
  document.getElementById('stat-publicadores').textContent = publicadoresData.length; saveState();
}
function renderQuadras() {
  layerGroups.quadras.clearLayers();
  quadrasData.forEach((qd, idx) => {
    const cor = qd.cor || getColorForMapa(qd.mapa); const baseWeight = qd.weight||3;
    const isFiltered = !!(activeMapaFilter || activeQuadraGrupoFilter);
    const match = activeMapaFilter ? qd.mapa===activeMapaFilter : (activeQuadraGrupoFilter ? qd.grupo===activeQuadraGrupoFilter : true);
    const fillOpacity = isFiltered?(match?0.55:0.06):0.32;
    const borderOpacity = isFiltered?(match?1:0.25):0.9;
    const weight = (match||!isFiltered)?baseWeight:Math.max(1,baseWeight-2);
    const poly = L.polygon(qd.coords, { color:cor, weight, fillColor:cor, fillOpacity, opacity:borderOpacity });
    poly.bindPopup(`<b>Mapa ${qd.mapa}</b>${qd.nome?'<br>'+qd.nome:''}${qd.grupo?`<br>👥 Grupo responsável: <b>${qd.grupo}</b>`:''}<br><small>${qd.coords.length} pontos</small>`+(editMode?`<br><button onclick="deleteQuadra(${idx})" style="margin-top:6px;background:#d93025;color:white;border:none;border-radius:8px;padding:7px 12px;font-size:0.8rem;font-weight:700;cursor:pointer">🗑 Excluir</button>`:''));
    poly.addTo(layerGroups.quadras);
    const center = poly.getBounds().getCenter();
    L.marker(center, { icon: L.divIcon({ className:'', html:`<div class="quadra-label" style="border:2px solid ${cor}">${qd.mapa}</div>`, iconSize:[0,0] }), interactive:false }).addTo(layerGroups.quadras);
    qd._layer = poly;
  });
  document.getElementById('cnt-quadras').textContent = quadrasData.length;
  document.getElementById('stat-quadras').textContent = quadrasData.length; saveState();
}
function deleteQuadra(idx) {
  if (!confirm('Remover esta quadra?')) return;
  quadrasData.splice(idx,1); renderQuadras(); renderCatbar(); renderList();
}

// ── DRAW ──
function onDrawClick(e) { if (!drawingQuadra) return; drawPoints.push([e.latlng.lat,e.latlng.lng]); updateDrawPreview(); }
function updateDrawPreview() {
  if (drawPreviewLayer) { map.removeLayer(drawPreviewLayer); drawPreviewLayer=null; }
  if (!drawPoints.length) return;
  drawPreviewLayer = L.layerGroup();
  L.polygon(drawPoints, { color:'#1a73e8', weight:2, dashArray:'6,4', fillOpacity:0.12 }).addTo(drawPreviewLayer);
  drawPoints.forEach(p => L.circleMarker(p, { radius:5, color:'#1a73e8', weight:2, fillColor:'white', fillOpacity:1 }).addTo(drawPreviewLayer));
  drawPreviewLayer.addTo(map);
}
function undoDrawPoint() { drawPoints.pop(); updateDrawPreview(); }
function startDrawQuadra() {
  drawingQuadra=true; drawPoints=[]; updateDrawPreview();
  showHint('Toque no mapa pra marcar os cantos da quadra (mín. 3). Depois toque em Finalizar.');
  document.getElementById('drawToolbar').classList.add('show');
  document.getElementById('fabBtn').classList.remove('show');
  map.on('click', onDrawClick);
}
function stopDrawing() {
  drawingQuadra=false; drawPoints=[];
  if (drawPreviewLayer) { map.removeLayer(drawPreviewLayer); drawPreviewLayer=null; }
  map.off('click', onDrawClick);
  document.getElementById('drawToolbar').classList.remove('show');
}
function refreshHintForTab() {
  if (!editMode) { hideHint(); document.getElementById('fabBtn').classList.remove('show'); return; }
  showHint(activeTab==='quadras' ? 'Toque em ＋ pra desenhar nova quadra' : 'Modo edição — arraste pontos ou toque pra editar');
  document.getElementById('fabBtn').classList.toggle('show', viewMode==='mapa');
}
function cancelDrawQuadra() { stopDrawing(); refreshHintForTab(); }
function finalizeDrawQuadra() {
  if (drawPoints.length<3) { alert('Marque pelo menos 3 cantos.'); return; }
  const mapa = prompt('Número do mapa (ex: 15):'); if (!mapa) return;
  const nome = prompt('Nome/observação (opcional):', '') || '';
  quadrasData.push({ mapa: mapa.trim(), nome, coords: drawPoints.slice(), cor: null, grupo: '' });
  stopDrawing(); refreshHintForTab(); renderQuadras(); renderCatbar(); renderList(); updateLegend();
}

// ── HINT ──
function showHint(msg) { const el=document.getElementById('hintToast'); el.textContent=msg; el.classList.add('show'); }
function hideHint() { document.getElementById('hintToast').classList.remove('show'); }

// ── SWITCHES ──
function switchTab(name, btn) {
  stopDrawing(); activeTab = name;
  const targetBtn = btn || document.querySelector('.stat-card[data-layer="'+name+'"]');
  document.querySelectorAll('.stat-card').forEach(b => b.classList.toggle('active', b===targetBtn));
  Object.keys(layerGroups).forEach(k => {
    if (k===name) { if (!map.hasLayer(layerGroups[k])) map.addLayer(layerGroups[k]); }
    else { if (map.hasLayer(layerGroups[k])) map.removeLayer(layerGroups[k]); }
  });
  document.body.classList.toggle('show-catbar', name==='comercios'||name==='publicadores'||name==='quadras');
  refreshHintForTab();
  if (name==='comercios') { renderCatbar(); renderComercios(); }
  if (name==='condominios') { renderCondominios(); }
  if (name==='publicadores') { renderCatbar(); renderPublicadores(); }
  if (name==='quadras') { renderCatbar(); renderQuadras(); }
  updateLegend(); renderList();
  document.getElementById('topbar-subtitle').textContent = {
    grupos:'Grupos de Campo', comercios:'Comércios e Lugares',
    condominios:'Condomínios e Prédios', publicadores:'Publicadores', quadras:'Quadras por Mapa'
  }[name] || 'Gestão de Território';
}

function setViewMode(mode) {
  viewMode = mode;
  document.getElementById('nav-mapa').classList.toggle('active', mode==='mapa');
  document.getElementById('nav-lista').classList.toggle('active', mode==='lista');
  document.getElementById('map').style.display = mode==='mapa'?'block':'none';
  document.getElementById('legendBox').style.display = mode==='mapa'?'block':'none';
  document.querySelector('.locate-fab').style.display = mode==='mapa'?'flex':'none';
  document.getElementById('listView').classList.toggle('show', mode==='lista');
  document.getElementById('fabBtn').style.display = (mode==='mapa'&&editMode)?'flex':'none';
  if (mode==='lista') { stopDrawing(); document.getElementById('drawToolbar').classList.remove('show'); hideHint(); }
  if (mode==='mapa') { setTimeout(()=>map.invalidateSize(),50); }
  if (mode==='lista') renderList();
}

// ── LEGEND ──
function updateLegend() {
  const box = document.getElementById('legendBox'); let html='';
  if (activeTab==='grupos') { html='<span class="legend-title">Saídas de campo</span>'; saidasData.forEach(s=>html+=`<div><span class="dot" style="background:${s.cor}"></span>${s.grupo} — ${s.nome}</div>`); }
  if (activeTab==='publicadores') { html='<span class="legend-title">Grupos</span>'; Object.entries(groupColors).forEach(([g,c])=>html+=`<div style="${activeGroupFilter&&activeGroupFilter!==g?'opacity:0.3':''}"><span class="dot" style="background:${c}"></span>${g}</div>`); if (activeGroupFilter) html+=`<div style="margin-top:4px;font-size:0.68rem;color:#5f6368">Filtro: ${activeGroupFilter}</div>`; }
  if (activeTab==='comercios') { html='<span class="legend-title">Comércios</span><div style="font-size:0.7rem;color:#5f6368">Toque num ponto</div>'; }
  if (activeTab==='condominios') { html='<span class="legend-title">Condomínios</span><div style="font-size:0.7rem;color:#5f6368">Toque num ponto</div>'; }
  if (activeTab==='quadras') {
    if (quadraCatMode==='grupo') {
      html='<span class="legend-title">Quadras por grupo</span>';
      const semGrupo = quadrasData.filter(qd=>!qd.grupo).length;
      if (!quadrasData.length) html+='<div style="font-size:0.7rem;color:#9aa0a6;margin-top:4px">Nenhuma quadra ainda</div>';
      else {
        Object.entries(groupColors).forEach(([g,c])=>html+=`<div style="${activeQuadraGrupoFilter&&activeQuadraGrupoFilter!==g?'opacity:0.3':''}"><span class="dot" style="background:${c}"></span>${g}</div>`);
        if (semGrupo) html+=`<div style="${activeQuadraGrupoFilter&&activeQuadraGrupoFilter!=='__sem__'?'opacity:0.3':''}"><span class="dot" style="background:#9aa0a6"></span>Sem grupo</div>`;
      }
      if (activeQuadraGrupoFilter) html+=`<div style="margin-top:4px;font-size:0.68rem;color:#5f6368">Filtro: ${activeQuadraGrupoFilter==='__sem__'?'Sem grupo':activeQuadraGrupoFilter}</div>`;
    } else {
      html='<span class="legend-title">Quadras por mapa</span>';
      const nums={}; quadrasData.forEach(qd=>{if(!nums[qd.mapa]) nums[qd.mapa]=qd.cor||getColorForMapa(qd.mapa);});
      if (!Object.keys(nums).length) html+='<div style="font-size:0.7rem;color:#9aa0a6;margin-top:4px">Nenhuma quadra ainda</div>';
      else Object.entries(nums).forEach(([n,c])=>html+=`<div style="${activeMapaFilter&&activeMapaFilter!==n?'opacity:0.3':''}"><span class="dot" style="background:${c}"></span>Mapa ${n}</div>`);
      if (activeMapaFilter) html+=`<div style="margin-top:4px;font-size:0.68rem;color:#5f6368">Filtro: Mapa ${activeMapaFilter}</div>`;
    }
  }
  box.innerHTML = html || '<span style="color:#9aa0a6">Nenhuma camada ativa</span>';
}

function startAddMode() {

  showHint('Toque no mapa para adicionar o ponto');
  map.once('click', function(e) { hideHint(); addNewItem(activeTab, e.latlng.lat, e.latlng.lng); });

async function addNewItem(target, lat, lng) {
  if (target==='comercios') {

    if (quadraCatMode==='grupo') {
      html += `<button class="cat-chip${activeQuadraGrupoFilter?'':' active'}" data-grp="">Todos <span class="count">${quadrasData.length}</span></button>`;
      Object.keys(groupColors).forEach(g=>{const count=quadrasData.filter(qd=>qd.grupo===g).length; html+=`<button class="cat-chip${activeQuadraGrupoFilter===g?' active':''}" data-grp="${g}"><span class="dot" style="background:${groupColors[g]};width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px"></span>${g} <span class="count">${count}</span></button>`;});

      if (semGrupo) html += `<button class="cat-chip${activeQuadraGrupoFilter==='__sem__'?' active':''}" data-grp="__sem__">Sem grupo <span class="count">${semGrupo}</span></button>`;
    } else {
      const nums={}; quadrasData.forEach(qd=>{if(!nums[qd.mapa]) nums[qd.mapa]=qd.cor||getColorForMapa(qd.mapa);});
      const sorted=Object.keys(nums).sort((a,b)=>{const na=parseInt(a,10),nb=parseInt(b,10); if(!isNaN(na)&&!isNaN(nb)&&na!==nb) return na-nb; return a.localeCompare(b,'pt-BR');});
      html += `<button class="cat-chip${activeMapaFilter?'':' active'}" data-mapa="">Todos <span class="count">${quadrasData.length}</span></button>`;
      sorted.forEach(n=>{const count=quadrasData.filter(qd=>qd.mapa===n).length; html+=`<button class="cat-chip${activeMapaFilter===n?' active':''}" data-mapa="${n}"><span class="dot" style="background:${nums[n]};width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px"></span>Mapa ${n} <span class="count">${count}</span></button>`;});
    }
    box.innerHTML=html;
    box.querySelectorAll('.mode-chip').forEach(btn=>{btn.onclick=()=>{quadraCatMode=btn.dataset.mode; activeMapaFilter=null; activeQuadraGrupoFilter=null; renderCatbar(); renderQuadras(); updateLegend(); if(viewMode==='lista') renderList();};});
    box.querySelectorAll('.cat-chip[data-mapa]').forEach(btn=>{btn.onclick=()=>{activeMapaFilter=btn.dataset.mapa||null; renderCatbar(); renderQuadras(); updateLegend(); if(viewMode==='lista') renderList(); if(activeMapaFilter){const m=quadrasData.filter(qd=>qd.mapa===activeMapaFilter&&qd._layer); if(m.length){const g=L.featureGroup(m.map(qd=>qd._layer)); map.fitBounds(g.getBounds(),{padding:[30,30]});}}};});
    box.querySelectorAll('.cat-chip[data-grp]').forEach(btn=>{btn.onclick=()=>{activeQuadraGrupoFilter=btn.dataset.grp||null; renderCatbar(); renderQuadras(); updateLegend(); if(viewMode==='lista') renderList(); if(activeQuadraGrupoFilter){const m=quadrasData.filter(qd=>(activeQuadraGrupoFilter==='__sem__'?!qd.grupo:qd.grupo===activeQuadraGrupoFilter)&&qd._layer); if(m.length){const g=L.featureGroup(m.map(qd=>qd._layer)); map.fitBounds(g.getBounds(),{padding:[30,30]});}}};});
    return;
  }
  if (activeTab==='publicadores') {
    let html=`<button class="cat-chip${activeGroupFilter?'':' active'}" data-grp="">Todos <span class="count">${publicadoresData.length}</span></button>`;
    Object.keys(groupColors).forEach(g=>{const count=publicadoresData.filter(p=>p.grupo===g).length; html+=`<button class="cat-chip${activeGroupFilter===g?' active':''}" data-grp="${g}"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${groupColors[g]};margin-right:4px"></span>${g} <span class="count">${count}</span></button>`;});
    box.innerHTML=html;
    box.querySelectorAll('.cat-chip').forEach(btn=>{btn.onclick=()=>{activeGroupFilter=btn.dataset.grp||null; renderCatbar(); renderPublicadores(); if(viewMode==='lista') renderList();};});

  }

  const catNames=Object.keys(cats).sort((a,b)=>a.localeCompare(b,'pt-BR'));

// ── GLOBAL SEARCH ──
function openGlobalSearch() { document.getElementById('searchOverlay').classList.add('show'); const inp=document.getElementById('globalSearchInput'); inp.value=''; renderGlobalSearch(); setTimeout(()=>inp.focus(),50); }
function closeGlobalSearch() { document.getElementById('searchOverlay').classList.remove('show'); }
function renderGlobalSearch() {
  const box=document.getElementById('globalSearchResults');
  const q=(document.getElementById('globalSearchInput').value||'').trim().toLowerCase();
  let results=[];
  saidasData.forEach(s=>{const text=(s.grupo+' '+s.nome+' '+(s.endereco||'')).toLowerCase(); if(!q||text.includes(q)) results.push({badge:'📍',title:'Grupo '+s.grupo+' — '+s.nome,sub:s.endereco||'',tab:'grupos',item:s});});
  comerciosData.forEach(c=>{const text=(c.nome+' '+c.categoria+' '+c.endereco).toLowerCase(); if(!q||text.includes(q)) results.push({badge:'🏪',title:c.nome,sub:c.categoria+' — '+c.endereco,tab:'comercios',item:c});});
  condominiosData.forEach(c=>{const text=(c.nome+' '+c.endereco).toLowerCase(); if(!q||text.includes(q)) results.push({badge:'🏢',title:c.nome,sub:c.endereco,tab:'condominios',item:c});});
  publicadoresData.forEach(p=>{const text=(p.membros.join(' ')+' '+p.grupo+' '+(p.endereco||'')).toLowerCase(); if(!q||text.includes(q)) results.push({badge:'🏠',title:p.membros.join(', '),sub:'Grupo '+p.grupo+(p.endereco?' — '+p.endereco:''),tab:'publicadores',item:p});});
  quadrasData.forEach(qd=>{const text=('mapa '+qd.mapa+' '+(qd.nome||'')+' '+(qd.grupo||'')).toLowerCase(); if(!q||text.includes(q)) results.push({badge:'🧩',title:'Mapa '+qd.mapa+(qd.nome?' — '+qd.nome:''),sub:qd.coords.length+' pontos'+(qd.grupo?' — Grupo '+qd.grupo:''),tab:'quadras',item:qd});});
  if (!results.length) { box.innerHTML='<div class="empty-msg"><strong>😕</strong>Nada encontrado</div>'; return; }
  box.innerHTML='';
  results.slice(0,200).forEach(r=>{
    const div=document.createElement('div'); div.className='search-result';
    div.innerHTML=`<span class="search-badge">${r.badge}</span><div class="search-info"><b>${r.title}</b><span>${r.sub}</span></div>`;
    div.onclick=()=>{ closeGlobalSearch(); activeCategoryFilter=null; activeGroupFilter=null; activeMapaFilter=null; activeQuadraGrupoFilter=null; switchTab(r.tab); setTimeout(()=>focusItem(r.item),60); };
    box.appendChild(div);
  });
}

// ── FOCUS ──
function focusItem(item) {
  setViewMode('mapa');
  if (item._marker) { map.setView(item._marker.getLatLng(), 18); item._marker.openPopup(); }

}

      const cor=qd.cor||getColorForMapa(qd.mapa); const weight=qd.weight||3;
      const card=document.createElement('div'); card.className='card'; card.style.borderLeftColor=cor;
      card.innerHTML=`<div class="card-header"><div class="card-avatar" style="background:${cor}20;border:2px solid ${cor}"><span style="font-size:18px">🧩</span></div><div><div class="card-name">Mapa ${qd.mapa}</div><div class="card-sub">${qd.nome||'Sem nome'} — ${qd.coords.length} pontos${qd.grupo?' — 👥 '+qd.grupo:''}</div></div></div><div class="card-label">Número do mapa</div><div class="card-row"><input type="text" data-f="mapa" value="${qd.mapa}"></div><div class="card-label">Nome/observação</div><div class="card-row"><input type="text" data-f="nome" value="${qd.nome||''}"></div><div class="card-label">Grupo responsável</div><div class="card-row"><select data-f="grupo"><option value="">Sem grupo atribuído</option>${Object.keys(groupColors).map(g=>`<option value="${g}" ${g===qd.grupo?'selected':''}>${g}</option>`).join('')}</select></div><div class="card-label">Cor</div><div class="card-row"><input type="color" data-f="cor" value="${cor}" style="flex:0 0 48px;height:38px;padding:2px;cursor:pointer"><button type="button" class="btn-cor-auto">🎨 Auto</button></div><div class="card-label">Espessura</div><div class="card-row"><input type="number" data-f="weight" min="1" max="12" value="${weight}"></div><div class="card-actions"><button class="btn-action btn-save-card" disabled>💾 Salvar</button><button class="btn-action btn-locate">🗺 Ver</button><button class="btn-action btn-remove">🗑</button></div>`;
      wireDirty(card);
      card.querySelector('.btn-cor-auto').onclick=()=>{card.querySelector('[data-f="cor"]').value=getColorForMapa(card.querySelector('[data-f="mapa"]').value.trim()||qd.mapa); card.classList.add('dirty'); card.querySelector('.btn-save-card').disabled=false;};
      card.querySelector('.btn-save-card').onclick=()=>{qd.mapa=card.querySelector('[data-f="mapa"]').value.trim(); qd.nome=card.querySelector('[data-f="nome"]').value; qd.grupo=card.querySelector('[data-f="grupo"]').value||''; qd.cor=card.querySelector('[data-f="cor"]').value; const w=parseInt(card.querySelector('[data-f="weight"]').value,10); qd.weight=isNaN(w)?3:Math.max(1,Math.min(12,w)); renderQuadras(); renderCatbar(); updateLegend(); finishSave(card);};
      card.querySelector('.btn-locate').onclick=()=>focusItem(qd);
      card.querySelector('.btn-remove').onclick=()=>{if(!confirm('Remover quadra?')) return; const idx=quadrasData.indexOf(qd); if(idx>-1) quadrasData.splice(idx,1); renderQuadras(); renderList(); renderCatbar(); updateLegend();};
      box.appendChild(card);
    });
  }
}

// ── EXPORT/IMPORT ──
function exportData() {
  const payload={saidasData,comerciosData,condominiosData,publicadoresData,quadrasData,exportedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(payload,jsonReplacer,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=`territorio-jardim-ivete-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  showSnack('💾 Exportado com sucesso');
}
function importData(event) {
  const file=event.target.files[0]; if (!file) return;
  const reader=new FileReader(); reader.onload=()=>{
    try {
      const saved=JSON.parse(reader.result);
      if (!confirm('Importar vai substituir todos os dados atuais. Continuar?')) return;
      if(Array.isArray(saved.saidasData)){saidasData.length=0;saved.saidasData.forEach(x=>saidasData.push(x));}
      if(Array.isArray(saved.comerciosData)){comerciosData.length=0;saved.comerciosData.forEach(x=>comerciosData.push(x));}
      if(Array.isArray(saved.condominiosData)){condominiosData.length=0;saved.condominiosData.forEach(x=>condominiosData.push(x));}
      if(Array.isArray(saved.publicadoresData)){publicadoresData.length=0;saved.publicadoresData.forEach(x=>publicadoresData.push(x));}
      if(Array.isArray(saved.quadrasData)){quadrasData.length=0;saved.quadrasData.forEach(x=>quadrasData.push(x));}
      renderGrupos();renderComercios();renderCondominios();renderPublicadores();renderQuadras();updateLegend();renderList();
      showSnack('✓ Dados importados com sucesso');
    } catch(e) { showSnack('❌ Arquivo inválido'); }
  };
  reader.readAsText(file); event.target.value='';
}

// ── STORAGE ──
loadState();

// ── PWA / SERVICE WORKER (ícone do app ao instalar/adicionar atalho) ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}

// ── INIT ──
renderGrupos(); renderComercios(); renderCondominios(); renderPublicadores(); renderQuadras(); updateLegend(); renderList();

(async function fillMissingGroupAddresses(){
  let changed=false;
  for(const s of saidasData){if(!s.endereco){const addr=await reverseGeocode(s.lat,s.lng); if(addr){s.endereco=addr;changed=true;}}}
  if(changed){renderGrupos(); if(activeTab==='grupos') renderList();}
})();

</script>
