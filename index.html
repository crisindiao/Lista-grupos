<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Território Jardim Ivete</title>
<style>
  :root { --rose: #d6336c; --gold: #b76e79; --dark: #141314; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--dark); }

  .topbar {
    position: absolute; top: 0; left: 0; right: 0; height: 56px;
    z-index: 1000; background: linear-gradient(135deg, var(--rose) 0%, var(--gold) 100%);
    display: flex; align-items: center; gap: 6px; padding: 0 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    overflow-x: auto;
  }
  .topbar .brand {
    color: white; font-weight: 800; font-size: 0.95rem; padding: 0 10px 0 4px;
    white-space: nowrap; flex-shrink: 0; letter-spacing: .02em;
  }
  .main-tab-btn {
    background: rgba(255,255,255,0.18); color: white; border: none;
    padding: 9px 16px; border-radius: 20px; font-weight: 700; font-size: 0.85rem;
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
    display: flex; align-items: center; gap: 6px;
  }
  .main-tab-btn.active { background: white; color: var(--rose); }

  .frame-wrap { position: absolute; top: 56px; left: 0; right: 0; bottom: 0; background: var(--dark); }
  .frame-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; background: var(--dark); }
  .frame-wrap iframe.active { display: block; }

  .loading {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    color: #999; font-size: 0.85rem; font-family: monospace;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="topbar">
  <span class="brand">📍 Jardim Ivete</span>
  <button class="main-tab-btn active" data-tab="mapa" onclick="switchTab('mapa', this)">🗺️ Mapa do Território</button>
  <button class="main-tab-btn" data-tab="grupos" onclick="switchTab('grupos', this)">👥 Grupos de Campo</button>
</div>

<div class="frame-wrap">
  <div class="loading" id="loadingMsg">carregando…</div>
  <iframe id="frame-mapa" class="active" src="mapa.html" title="Mapa do território" onload="hideLoading()"></iframe>
  <iframe id="frame-grupos" src="grupos.html" title="Grupos de campo" onload="hideLoading()"></iframe>
</div>

<script>
  function switchTab(name, btn) {
    document.querySelectorAll('.main-tab-btn').forEach(b => b.classList.toggle('active', b === btn));
    document.querySelectorAll('.frame-wrap iframe').forEach(f => f.classList.toggle('active', f.id === 'frame-' + name));
  }
  function hideLoading() {
    const el = document.getElementById('loadingMsg');
    if (el) el.style.display = 'none';
  }
</script>

</body>
</html>
