<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Território Jardim Ivete - Gestão</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1c1b29;
    --ink-soft: #524f66;
    --brand: #7c3aed;
    --brand-dark: #5b21b6;
    --brand-soft: #ede9fe;
    --coral: #f0653e;
    --gold: #d99a3d;
    --bg: #f6f4f9;
    --surface: #ffffff;
    --line: #e7e3ee;
    --shadow: 0 2px 14px rgba(28,27,41,0.09);
    --shadow-lg: 0 8px 28px rgba(28,27,41,0.16);
    --radius: 14px;
    --font-display: 'Manrope', system-ui, sans-serif;
    --font-body: 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: var(--font-body); color: var(--ink); -webkit-tap-highlight-color: transparent; }
  #map { position: absolute; top: 100px; left: 0; right: 0; bottom: 0; background: var(--bg); }
  button { font-family: inherit; }

  .topbar {
    position: absolute; top: 0; left: 0; right: 0; height: 56px;
    z-index: 1000; background: var(--ink);
    display: flex; align-items: center; gap: 6px; padding: 0 8px;
    box-shadow: var(--shadow);
    overflow-x: auto;
  }
  .tab-btn {
    background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.72); border: none;
    padding: 8px 14px; border-radius: 20px; font-family: var(--font-display); font-weight: 700; font-size: 0.82rem;
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
    display: flex; align-items: center; gap: 6px;
    transition: background .15s ease, color .15s ease;
  }
  .tab-btn.active { background: var(--brand); color: white; }
  .tab-btn .count {
    background: rgba(255,255,255,0.15); border-radius: 10px; padding: 1px 7px; font-size: 0.68rem; font-family: var(--font-body); font-weight: 600;
  }
  .tab-btn.active .count { background: rgba(255,255,255,0.25); }

  .subbar {
    position: absolute; top: 56px; left: 0; right: 0; height: 44px;
    z-index: 999; background: var(--surface); display: flex; align-items: center;
    padding: 0 8px; gap: 6px; border-bottom: 1px solid var(--line);
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .view-btn {
    background: var(--bg); color: var(--ink-soft); border: none;
    padding: 6px 14px; border-radius: 16px; font-weight: 600; font-size: 0.78rem;
    cursor: pointer; display: flex; align-items: center; gap: 5px; white-space: nowrap; flex-shrink: 0;
    transition: background .15s ease, color .15s ease;
  }
  .view-btn.active { background: var(--brand); color: white; }
  .subbar .spacer { flex: 0 0 10px; }
  .edit-toggle {
    background: var(--bg); color: var(--ink-soft); border: none;
    padding: 6px 12px; border-radius: 16px; font-weight: 600; font-size: 0.76rem;
    cursor: pointer; flex-shrink: 0; white-space: nowrap; display: flex; align-items: center; gap: 4px;
    transition: background .15s ease, color .15s ease;
  }
  .edit-toggle.on { background: var(--coral); color: #fff; }

  .hint-bar {
    position: absolute; top: 106px; left: 50%; transform: translateX(-50%);
    z-index: 999; background: var(--ink); color: white; padding: 7px 15px;
    border-radius: 20px; font-size: 0.75rem; font-weight: 500; box-shadow: var(--shadow-lg);
    display: none; max-width: 90vw; text-align: center;
  }
  .hint-bar.show { display: block; }
  body.show-catbar .hint-bar { top: 152px; }

  /* ---------- Barra de categorias (Comércios e Lugares) ---------- */
  .catbar {
    position: absolute; top: 100px; left: 0; right: 0; height: 0; overflow: hidden;
    z-index: 998; background: var(--surface); box-shadow: 0 1px 0 var(--line);
    transition: height .15s ease;
  }
  body.show-catbar .catbar { height: 46px; }
  body.show-catbar #map { top: 146px; }
  body.show-catbar .list-view { top: 146px; }
  .catbar-inner {
    height: 46px; display: flex; align-items: center; gap: 6px; padding: 0 8px; overflow-x: auto;
  }
  .cat-chip {
    background: var(--bg); color: var(--ink-soft); border: none; padding: 7px 13px; border-radius: 16px;
    font-size: 0.78rem; font-weight: 600; cursor: pointer; white-space: nowrap; flex-shrink: 0;
    display: flex; align-items: center; gap: 5px;
    transition: background .15s ease, color .15s ease;
  }
  .cat-chip.active { background: var(--brand); color: white; }
  .cat-chip .count { opacity: 0.7; font-weight: 600; }

  .quadra-label {
    background: rgba(255,255,255,0.92); border-radius: 6px; padding: 1px 7px;
    font-weight: 800; font-size: 0.72rem; box-shadow: 0 1px 4px rgba(0,0,0,0.35);
    white-space: nowrap; transform: translate(-50%, -50%); color: var(--ink); font-family: var(--font-display);
  }

  .draw-toolbar {
    position: absolute; bottom: 88px; left: 50%; transform: translateX(-50%);
    z-index: 1001; display: none; gap: 8px; flex-wrap: wrap; justify-content: center; max-width: 94vw;
  }
  .draw-toolbar.show { display: flex; }
  .draw-toolbar button {
    padding: 10px 16px; border: none; border-radius: 20px; font-weight: 700; font-size: 0.82rem;
    font-family: var(--font-display); box-shadow: var(--shadow-lg); cursor: pointer; white-space: nowrap;
  }
  .btn-finalizar { background: #2f9e44; color: white; }
  .btn-desfazer { background: var(--gold); color: white; }
  .btn-cancelar-draw { background: #e11d48; color: white; }

  /* ---------- Busca geral ---------- */
  .search-overlay {
    position: absolute; inset: 0; z-index: 1500; background: var(--bg); display: none; flex-direction: column;
  }
  .search-overlay.show { display: flex; }
  .search-overlay-bar { display: flex; gap: 8px; padding: 10px; background: var(--ink); flex-shrink: 0; }
  .search-overlay-bar input {
    flex: 1; padding: 11px 14px; border-radius: 12px; border: none; font-size: 0.92rem; font-family: var(--font-body);
  }
  .search-overlay-bar input:focus { outline: 2px solid var(--brand); outline-offset: 1px; }
  .search-overlay-bar button {
    background: rgba(255,255,255,0.12); color: white; border: none; border-radius: 12px;
    padding: 0 18px; font-size: 1.1rem; cursor: pointer;
  }
  .search-overlay-results { flex: 1; overflow-y: auto; padding: 10px; }
  .search-result {
    background: var(--surface); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow); cursor: pointer;
    border: 1px solid var(--line); transition: transform .1s ease;
  }
  .search-result:active { transform: scale(0.98); }
  .search-result .badge {
    font-size: 1.1rem; flex-shrink: 0; width: 34px; height: 34px; border-radius: 10px;
    background: var(--brand-soft); display: flex; align-items: center; justify-content: center;
  }
  .search-result .info b { display: block; font-size: 0.87rem; font-weight: 600; color: var(--ink); }
  .search-result .info span { font-size: 0.74rem; color: var(--ink-soft); }

  .locate-btn {
    position: absolute; bottom: 24px; right: 12px; z-index: 1000;
    background: var(--surface); color: var(--brand); border: none; width: 48px; height: 48px;
    border-radius: 50%; box-shadow: var(--shadow-lg); font-size: 20px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }

  .legend {
    position: absolute; bottom: 24px; left: 12px; z-index: 1000;
    background: var(--surface); border-radius: 12px; box-shadow: var(--shadow-lg);
    padding: 10px 13px; font-size: 0.72rem; line-height: 1.7; max-width: 46vw;
    max-height: 40vh; overflow-y: auto; border: 1px solid var(--line);
  }
  .legend b { display: block; margin-bottom: 4px; font-size: 0.74rem; font-family: var(--font-display); color: var(--ink); }
  .legend .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; vertical-align: middle; border: 1px solid white; box-shadow: 0 0 0 1px rgba(0,0,0,0.15); }

  .saida-pin { width: 28px; height: 28px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); border: 2px solid white; box-shadow: 0 3px 8px rgba(28,27,41,0.35); display: flex; align-items: center; justify-content: center; }
  .saida-pin span { transform: rotate(45deg); color: white; font-weight: 800; font-size: 12px; font-family: var(--font-display); }

  .add-btn {
    position: absolute; bottom: 24px; right: 70px; z-index: 1000;
    background: var(--brand); color: white; border: none; width: 48px; height: 48px;
    border-radius: 50%; box-shadow: var(--shadow-lg); font-size: 22px;
    cursor: pointer; display: none; align-items: center; justify-content: center;
  }
  .add-btn.show { display: flex; }

  .popup-edit { font-family: var(--font-body); }
  .popup-edit b { font-family: var(--font-display); color: var(--ink); }
  .popup-edit input, .popup-edit select {
    width: 100%; padding: 7px 9px; margin: 4px 0; border: 1px solid var(--line); border-radius: 8px; font-size: 0.85rem; font-family: var(--font-body);
  }
  .popup-edit input:focus, .popup-edit select:focus { outline: none; border-color: var(--brand); }
  .popup-edit button {
    padding: 6px 12px; border: none; border-radius: 8px; font-size: 0.8rem; font-weight: 700; cursor: pointer; margin-top: 5px; margin-right: 5px;
  }
  .btn-save { background: #16a34a; color: white; }
  .btn-del { background: #e11d48; color: white; }

  /* ---------- Lista view ---------- */
  .list-view {
    position: absolute; top: 100px; left: 0; right: 0; bottom: 0;
    background: var(--bg); overflow-y: auto; padding: 12px 12px 90px; display: none;
  }
  .list-view.show { display: block; }
  .list-add-bar { display: flex; gap: 8px; margin-bottom: 12px; }
  .list-add-bar button {
    flex: 1; background: var(--brand); color: white; border: none; border-radius: 12px;
    padding: 12px; font-weight: 700; font-family: var(--font-display); font-size: 0.85rem; cursor: pointer;
    box-shadow: var(--shadow);
  }
  .list-search {
    width: 100%; padding: 11px 14px; border-radius: 12px; border: 1px solid var(--line);
    font-size: 0.85rem; margin-bottom: 12px; background: var(--surface); font-family: var(--font-body);
  }
  .list-search:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-soft); }
  .card {
    background: var(--surface); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px;
    box-shadow: var(--shadow); border-left: 4px solid #a1a1aa; border-top: 1px solid var(--line); border-right: 1px solid var(--line); border-bottom: 1px solid var(--line);
    transition: box-shadow .15s ease;
  }
  .card-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
  .card input, .card select {
    flex: 1; padding: 8px 10px; border: 1px solid var(--line); border-radius: 9px; font-size: 0.85rem;
    background: var(--bg); font-family: var(--font-body); color: var(--ink);
  }
  .card input:focus, .card select:focus { background: var(--surface); border-color: var(--brand); outline: none; box-shadow: 0 0 0 3px var(--brand-soft); }
  .card.dirty { border-left-color: var(--gold); box-shadow: 0 0 0 2px rgba(217,154,61,0.25); }
  .geo-status { font-size: 0.68rem; margin: -2px 0 4px; min-height: 12px; font-weight: 500; }
  .geo-status.ok { color: #16a34a; }
  .geo-status.fail { color: #e11d48; }
  .btn-save-card {
    background: #16a34a; color: white; opacity: 0.4;
  }
  .btn-save-card:not(:disabled) { opacity: 1; }
  .card-label { font-size: 0.64rem; text-transform: uppercase; letter-spacing: .05em; color: #9691a8; font-weight: 700; width: 100%; margin: 5px 0 -2px; }
  .card-actions { display: flex; justify-content: flex-end; gap: 6px; margin-top: 8px; }
  .card-actions button {
    border: none; border-radius: 9px; padding: 7px 13px; font-size: 0.75rem; font-weight: 700; cursor: pointer;
    transition: filter .15s ease;
  }
  .card-actions button:active { filter: brightness(0.95); }
  .btn-locate { background: #ede9fe; color: var(--brand-dark); }
  .btn-remove { background: #fde8ea; color: #e11d48; }
  .empty-msg { text-align: center; color: #9691a8; font-size: 0.88rem; margin-top: 60px; font-weight: 500; }
</style>
</head>
<body>

<div class="topbar">
  <button class="tab-btn active" data-layer="grupos" onclick="switchTab('grupos', this)">📍 Grupos <span class="count" id="cnt-grupos">5</span></button>
  <button class="tab-btn" data-layer="comercios" onclick="switchTab('comercios', this)">🏪 Comércios e Lugares <span class="count" id="cnt-comercios">0</span></button>
  <button class="tab-btn" data-layer="condominios" onclick="switchTab('condominios', this)">🏢 Condomínios e Prédios <span class="count" id="cnt-condominios">0</span></button>
  <button class="tab-btn" data-layer="publicadores" onclick="switchTab('publicadores', this)">🏠 Publicadores <span class="count" id="cnt-publicadores">0</span></button>
  <button class="tab-btn" data-layer="quadras" onclick="switchTab('quadras', this)">🧩 Quadras <span class="count" id="cnt-quadras">0</span></button>
</div>

<div class="subbar">
  <button class="view-btn active" id="viewMapaBtn" onclick="setViewMode('mapa')">🗺️ Mapa</button>
  <button class="view-btn" id="viewListaBtn" onclick="setViewMode('lista')">📋 Lista</button>
  <button class="view-btn" onclick="openGlobalSearch()">🔍 Buscar tudo</button>
  <div class="spacer"></div>
  <button class="edit-toggle" onclick="exportData()">💾 Exportar</button>
  <button class="edit-toggle" onclick="document.getElementById('importFile').click()">📂 Importar</button>
  <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importData(event)">
  <button class="edit-toggle" id="editToggleBtn" onclick="toggleEditMode()">✏️ Arrastar no mapa</button>
</div>

<div class="catbar" id="catbar">
  <div class="catbar-inner" id="catbarInner"></div>
</div>

<div class="hint-bar" id="hintBar">Modo edição ativo — arraste um ponto no mapa pra mover, ou toque nele pra editar</div>
<div class="draw-toolbar" id="drawToolbar">
  <button class="btn-desfazer" onclick="undoDrawPoint()">↩️ Desfazer ponto</button>
  <button class="btn-finalizar" onclick="finalizeDrawQuadra()">✅ Finalizar quadra</button>
  <button class="btn-cancelar-draw" onclick="cancelDrawQuadra()">✖️ Cancelar</button>
</div>

<div id="map"></div>
<button class="locate-btn" onclick="locateMe()">📍</button>
<button class="add-btn" id="addBtn" onclick="startAddMode()">➕</button>
<div class="legend" id="legendBox"></div>

<div class="list-view" id="listView">
  <input type="text" class="list-search" id="listSearch" placeholder="Buscar..." oninput="renderList()">
  <div class="list-add-bar">
    <button onclick="addItemPrompt()">➕ Adicionar novo</button>
  </div>
  <div id="listCards"></div>
</div>

<div class="search-overlay" id="searchOverlay">
  <div class="search-overlay-bar">
    <input type="text" id="globalSearchInput" placeholder="Buscar em grupos, comércios, condomínios, publicadores e quadras..." oninput="renderGlobalSearch()">
    <button onclick="closeGlobalSearch()">✕</button>
  </div>
  <div class="search-overlay-results" id="globalSearchResults"></div>
</div>

  // ---------- QUADRAS (contornos de blocos, agrupados por número do mapa) ----------
  const quadrasData = [];
  const quadraPalette = ['#e03131','#1971c2','#2f9e44','#f08c00','#9c36b5','#0c8599','#e64980','#5f3dc4','#37b24d','#f76707','#495057','#862e9c','#0ca678','#d6336c','#1c7ed6','#fab005','#82c91e','#364fc7'];
  function getColorForMapa(mapa) {
    let hash = 0;
    const s = String(mapa);
    for (let i = 0; i < s.length; i++) { hash = (hash * 31 + s.charCodeAt(i)) >>> 0; }
    return quadraPalette[hash % quadraPalette.length];
  }

  const DATA_STORAGE = "jardim-ivete-dados-v1";

  // Remove referências circulares (ex: _marker/_layer do Leaflet) antes de serializar
  function jsonReplacer(key, value) {
    if (key === '_marker' || key === '_layer') return undefined;
    return value;
  }

  function saveState() {
    try {
      const payload = { saidasData, comerciosData, condominiosData, publicadoresData, quadrasData, savedAt: new Date().toISOString() };
      localStorage.setItem(DATA_STORAGE, JSON.stringify(payload, jsonReplacer));
    } catch (e) { console.error('Falha ao salvar dados localmente:', e); }
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(DATA_STORAGE);
      if (!raw) return;
      const saved = JSON.parse(raw);
      if (Array.isArray(saved.saidasData)) { saidasData.length = 0; saved.saidasData.forEach(x => saidasData.push(x)); }
      if (Array.isArray(saved.comerciosData)) { comerciosData.length = 0; saved.comerciosData.forEach(x => comerciosData.push(x)); }
      if (Array.isArray(saved.condominiosData)) { condominiosData.length = 0; saved.condominiosData.forEach(x => condominiosData.push(x)); }
      if (Array.isArray(saved.publicadoresData)) { publicadoresData.length = 0; saved.publicadoresData.forEach(x => publicadoresData.push(x)); }
      if (Array.isArray(saved.quadrasData)) { quadrasData.length = 0; saved.quadrasData.forEach(x => quadrasData.push(x)); }
    } catch (e) { console.error('Falha ao carregar dados salvos:', e); }
  }
  loadState();

  function exportData() {
    const payload = { saidasData, comerciosData, condominiosData, publicadoresData, quadrasData, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(payload, jsonReplacer, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const dataStr = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = `territorio-jardim-ivete-${dataStr}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const saved = JSON.parse(reader.result);
        if (!confirm('Importar este arquivo vai substituir todos os dados atuais (grupos, comércios, condomínios, publicadores, quadras). Continuar?')) return;
        if (Array.isArray(saved.saidasData)) { saidasData.length = 0; saved.saidasData.forEach(x => saidasData.push(x)); }
        if (Array.isArray(saved.comerciosData)) { comerciosData.length = 0; saved.comerciosData.forEach(x => comerciosData.push(x)); }
        if (Array.isArray(saved.condominiosData)) { condominiosData.length = 0; saved.condominiosData.forEach(x => condominiosData.push(x)); }
        if (Array.isArray(saved.publicadoresData)) { publicadoresData.length = 0; saved.publicadoresData.forEach(x => publicadoresData.push(x)); }

  // ---------- Geocodificação (mesma API/chave e mesmo cache usados no grupos.html) ----------
  const GEO_API_KEY = "a5769984623a48f69c9ba7f9022a7858";
  const GEO_STORAGE = "jardim-ivete-geocache-v1";
  let geoCache = {};
  function loadGeoCache() {
    try { const r = localStorage.getItem(GEO_STORAGE); if (r) geoCache = JSON.parse(r); } catch (e) {}
  }
  function saveGeoCache() {
    try { localStorage.setItem(GEO_STORAGE, JSON.stringify(geoCache)); } catch (e) {}
  }
  async function geocode(addr) {
    if (!addr || !addr.trim()) return null;
    const key = addr.trim().toLowerCase();
    if (geoCache[key] !== undefined) return geoCache[key];
    try {
      const url = `https://api.opencagedata.com/geocode/v1/json?q=${encodeURIComponent(addr)}&key=${GEO_API_KEY}&language=pt&countrycode=br&limit=1`;
      const r = await fetch(url);
      const data = await r.json();
      const result = (data.results && data.results[0])
        ? { lat: data.results[0].geometry.lat, lng: data.results[0].geometry.lng }
        : null;
      geoCache[key] = result;
      saveGeoCache();
      return result;
    } catch (e) {
      return null;
    }
  }
  async function reverseGeocode(lat, lng) {
    const key = 'rev:' + lat.toFixed(6) + ',' + lng.toFixed(6);
    if (geoCache[key] !== undefined) return geoCache[key];
    try {
      const url = `https://api.opencagedata.com/geocode/v1/json?q=${lat}+${lng}&key=${GEO_API_KEY}&language=pt&countrycode=br&limit=1`;
      const r = await fetch(url);
      const data = await r.json();
      const result = (data.results && data.results[0]) ? data.results[0].formatted : null;
      geoCache[key] = result;
      saveGeoCache();
      return result;
    } catch (e) {
      return null;
    }
  }
  loadGeoCache();

  const map = L.map('map', { zoomControl: true, tap: true });

  }).addTo(map);

  // ---------- GRUPOS layer ----------
  function editSaidaPopup(marker, s) {
    const div = document.createElement('div');

      <b>Editar saída</b>

    div.querySelector('.btn-save').onclick = async () => {

      s.endereco = novoEndereco;

    div.querySelector('.btn-del').onclick = () => {

  }

  function renderGrupos() {
    layerGroups.grupos.clearLayers();
    saidasData.forEach(function(s) {
      let lat = s.lat, lng = s.lng;
      if (s.offset) { lat += s.offset[0]; lng += s.offset[1]; }
      const marker = L.marker([lat, lng], { icon: makeDivIcon(s.cor, s.grupo[0]), draggable: editMode });
      marker.bindPopup(editMode ? editSaidaPopup(marker, s) : `<b>Grupo ${s.grupo}</b><br>Saída: ${s.nome}${s.endereco ? '<br><span style="font-size:0.8em;color:#666">' + s.endereco + '</span>' : ''}`);

  // ---------- QUADRAS layer ----------
  function renderQuadras() {
    layerGroups.quadras.clearLayers();
    quadrasData.forEach(function(qd, idx) {
      const cor = qd.cor || getColorForMapa(qd.mapa);
      const baseWeight = qd.weight || 3;
      const isFiltered = !!activeMapaFilter;
      const match = qd.mapa === activeMapaFilter;
      const fillOpacity = isFiltered ? (match ? 0.55 : 0.06) : 0.32;
      const borderOpacity = isFiltered ? (match ? 1 : 0.25) : 0.9;
      const weight = (match || !isFiltered) ? baseWeight : Math.max(1, baseWeight - 2);
      const poly = L.polygon(qd.coords, { color: cor, weight, fillColor: cor, fillOpacity, opacity: borderOpacity });
      poly.bindPopup(`<b>Mapa ${qd.mapa}</b>${qd.nome ? '<br>' + qd.nome : ''}<br><span style="font-size:0.8em;color:#666">${qd.coords.length} pontos no contorno</span>` +
        (editMode ? `<br><button onclick="deleteQuadra(${idx})" style="margin-top:6px;background:#e11d48;color:white;border:none;border-radius:8px;padding:6px 12px;font-size:0.8rem;font-weight:700;cursor:pointer">🗑️ Excluir quadra</button>` : ''));
      poly.addTo(layerGroups.quadras);
      const center = poly.getBounds().getCenter();
      L.marker(center, {
        icon: L.divIcon({ className: '', html: `<div class="quadra-label" style="border:2px solid ${cor}">${qd.mapa}</div>`, iconSize: [0, 0] }),

      }).addTo(layerGroups.quadras);
      qd._layer = poly;
    });

    saveState();

  function deleteQuadra(idx) {

    quadrasData.splice(idx, 1);

  function onDrawClick(e) {
    if (!drawingQuadra) return;
    drawPoints.push([e.latlng.lat, e.latlng.lng]);
    updateDrawPreview();
  }
  function updateDrawPreview() {
    if (drawPreviewLayer) { map.removeLayer(drawPreviewLayer); drawPreviewLayer = null; }
    if (!drawPoints.length) return;
    drawPreviewLayer = L.layerGroup();
    L.polygon(drawPoints, { color: '#1c1b29', weight: 2, dashArray: '6,4', fillOpacity: 0.12 }).addTo(drawPreviewLayer);
    drawPoints.forEach(p => L.circleMarker(p, { radius: 5, color: '#1c1b29', weight: 2, fillColor: 'white', fillOpacity: 1 }).addTo(drawPreviewLayer));
    drawPreviewLayer.addTo(map);
  }
  function undoDrawPoint() {
    drawPoints.pop();
    updateDrawPreview();
  }
  function startDrawQuadra() {
    drawingQuadra = true;
    drawPoints = [];
    updateDrawPreview();
    const hint = document.getElementById('hintBar');
    hint.textContent = 'Toque no mapa pra marcar os cantos da quadra (mínimo 3). Depois toque em Finalizar.';
    hint.classList.add('show');
    document.getElementById('drawToolbar').classList.add('show');
    document.getElementById('addBtn').classList.remove('show');
    map.on('click', onDrawClick);
  }
  function stopDrawing() {
    drawingQuadra = false;
    drawPoints = [];
    if (drawPreviewLayer) { map.removeLayer(drawPreviewLayer); drawPreviewLayer = null; }
    map.off('click', onDrawClick);
    document.getElementById('drawToolbar').classList.remove('show');
  }
  function refreshHintForTab() {
    const hint = document.getElementById('hintBar');
    if (!editMode) {
      hint.classList.remove('show');
      document.getElementById('addBtn').classList.remove('show');
      return;
    }
    hint.textContent = activeTab === 'quadras'
      ? 'Toque em ➕ pra desenhar uma nova quadra. Toque numa quadra existente pra ver opções.'
      : 'Modo edição ativo — arraste um ponto no mapa pra mover, ou toque nele pra editar';
    hint.classList.add('show');
    document.getElementById('addBtn').classList.toggle('show', viewMode === 'mapa');
  }
  function cancelDrawQuadra() {
    stopDrawing();
    refreshHintForTab();
  }
  function finalizeDrawQuadra() {
    if (drawPoints.length < 3) { alert('Marque pelo menos 3 cantos pra formar a quadra.'); return; }
    const mapa = prompt('Número do mapa (ex: 15):');
    if (!mapa) return;
    const nome = prompt('Nome/observação da quadra (opcional):', '') || '';
    quadrasData.push({ mapa: mapa.trim(), nome, coords: drawPoints.slice(), cor: null });
    stopDrawing();
    refreshHintForTab();
    renderQuadras(); renderCatbar(); renderList(); updateLegend();
  }

  renderGrupos(); renderComercios(); renderCondominios(); renderPublicadores(); renderQuadras();

  // Preenche automaticamente o endereço dos grupos que ainda não têm, usando as coordenadas já cadastradas
  (async function fillMissingGroupAddresses() {
    let changed = false;
    for (const s of saidasData) {
      if (!s.endereco) {
        const addr = await reverseGeocode(s.lat, s.lng);
        if (addr) { s.endereco = addr; changed = true; }
      }
    }
    if (changed) {
      renderGrupos();
      if (activeTab === 'grupos') renderList();
    }
  })();

  // ---------- Abas (uma tela por vez) ----------
  function switchTab(name, btn) {
    stopDrawing();
    activeTab = name;
    const targetBtn = btn || document.querySelector('.tab-btn[data-layer="' + name + '"]');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === targetBtn));
    Object.keys(layerGroups).forEach(k => {
      if (k === name) { if (!map.hasLayer(layerGroups[k])) map.addLayer(layerGroups[k]); }
      else { if (map.hasLayer(layerGroups[k])) map.removeLayer(layerGroups[k]); }
    });
    document.body.classList.toggle('show-catbar', name === 'comercios' || name === 'publicadores' || name === 'quadras');
    const editLabels = { quadras: '✏️ Editar quadras' };
    document.getElementById('editToggleBtn').innerHTML = editLabels[name] || '✏️ Arrastar no mapa';
    refreshHintForTab();
    if (name === 'comercios') { renderCatbar(); renderComercios(); }
    if (name === 'condominios') { renderCondominios(); }
    if (name === 'publicadores') { renderCatbar(); renderPublicadores(); }
    if (name === 'quadras') { renderCatbar(); renderQuadras(); }
    updateLegend();
    renderList();
  }

  function setViewMode(mode) {
    viewMode = mode;
    document.getElementById('viewMapaBtn').classList.toggle('active', mode === 'mapa');
    document.getElementById('viewListaBtn').classList.toggle('active', mode === 'lista');
    document.getElementById('map').style.display = mode === 'mapa' ? 'block' : 'none';
    document.getElementById('legendBox').style.display = mode === 'mapa' ? 'block' : 'none';
    document.getElementById('locateBtnEl') && null;
    document.querySelector('.locate-btn').style.display = mode === 'mapa' ? 'flex' : 'none';
    document.getElementById('listView').classList.toggle('show', mode === 'lista');
    document.getElementById('addBtn').style.display = (mode === 'mapa' && editMode) ? 'flex' : 'none';
    document.getElementById('hintBar').classList.toggle('show', mode === 'mapa' && editMode);
    if (mode === 'lista') { stopDrawing(); document.getElementById('drawToolbar').classList.remove('show'); }
    if (mode === 'mapa') { setTimeout(() => map.invalidateSize(), 50); }
    if (mode === 'lista') renderList();
  }

  function updateLegend() {
    const box = document.getElementById('legendBox');
    let html = '';
    if (activeTab === 'grupos') {
      html += '<b>Saídas de campo</b>';
      saidasData.forEach(s => html += `<div><span class="dot" style="background:${s.cor}"></span>${s.grupo} — ${s.nome}</div>`);
    }
    if (activeTab === 'publicadores') {
      html += '<b>Publicadores por grupo</b>';
      Object.entries(groupColors).forEach(([g,c]) => html += `<div style="${activeGroupFilter && activeGroupFilter !== g ? 'opacity:0.35' : ''}"><span class="dot" style="background:${c}"></span>${g}</div>`);
      if (activeGroupFilter) html += `<div style="margin-top:4px;font-size:0.68rem;color:#666">Mostrando só: ${activeGroupFilter}</div>`;
    }
    if (activeTab === 'comercios') {
      html += '<b>Comércios</b><div style="font-size:0.7rem;color:#666">Toque num ponto pra ver categoria</div>';
    }
    if (activeTab === 'condominios') {
      html += '<b>Condomínios e Prédios</b><div style="font-size:0.7rem;color:#666">Toque num ponto pra ver detalhes</div>';
    }
    if (activeTab === 'quadras') {
      html += '<b>Quadras por mapa</b>';
      const nums = {};
      quadrasData.forEach(qd => { if (!nums[qd.mapa]) nums[qd.mapa] = qd.cor || getColorForMapa(qd.mapa); });
      if (!Object.keys(nums).length) {
        html += '<div style="font-size:0.7rem;color:#999;margin-top:4px">Nenhuma quadra desenhada ainda.<br>Ative "✏️ Editar quadras" e toque em ➕.</div>';
      } else {
        Object.entries(nums).forEach(([n, c]) => html += `<div style="${activeMapaFilter && activeMapaFilter !== n ? 'opacity:0.35' : ''}"><span class="dot" style="background:${c}"></span>Mapa ${n}</div>`);
        if (activeMapaFilter) html += `<div style="margin-top:4px;font-size:0.68rem;color:#666">Mostrando só: Mapa ${activeMapaFilter}</div>`;
      }
    }
    box.innerHTML = html || '<span style="color:#999">Nenhuma camada ativa</span>';
  }
  updateLegend();

  // ---------- Modo edição (arrastar no mapa) ----------
  function toggleEditMode() {
    editMode = !editMode;
    document.getElementById('editToggleBtn').classList.toggle('on', editMode);
    if (!editMode) stopDrawing();
    refreshHintForTab();
    renderGrupos(); renderComercios(); renderCondominios(); renderPublicadores(); renderQuadras();
  }

  function startAddMode() {
    if (activeTab === 'quadras') { startDrawQuadra(); return; }
    let target = activeTab;
    alert('Toque no mapa no local onde quer adicionar o novo ponto (' + target + ').');
    map.once('click', function(e) {
      const { lat, lng } = e.latlng;
      addNewItem(target, lat, lng);
    });
  }

  async function addNewItem(target, lat, lng) {
    if (target === 'comercios') {
      const nome = prompt('Nome do comércio:'); if (!nome) return;
      const categoria = prompt('Categoria:', 'Outros') || 'Outros';
      const endereco = prompt('Endereço (localizo automaticamente no mapa):', '') || '';
      let pos = { lat, lng };
      if (endereco) {
        const res = await geocode(endereco);
        if (res) pos = res; else alert('Não encontrei esse endereço, coloquei no centro do mapa — você pode arrastar depois no modo mapa.');
      }
      comerciosData.push({ nome, categoria, endereco, cor: '#495057', lat: pos.lat, lng: pos.lng });
      renderComercios();
    } else if (target === 'condominios') {
      const nome = prompt('Nome do condomínio/prédio:'); if (!nome) return;
      const endereco = prompt('Endereço (localizo automaticamente no mapa):', '') || '';
      let pos = { lat, lng };
      if (endereco) {
        const res = await geocode(endereco);
        if (res) pos = res; else alert('Não encontrei esse endereço, coloquei no centro do mapa — você pode arrastar depois no modo mapa.');
      }
      condominiosData.push({ nome, categoria: 'Condomínio/Prédio', endereco, cor: '#364fc7', lat: pos.lat, lng: pos.lng });
      renderCondominios();
    } else if (target === 'publicadores') {
      const nomes = prompt('Nome(s) da família (separe por vírgula):'); if (!nomes) return;
      const grupo = prompt('Grupo (Amor/Paz/Alegria/Bondade/Paciência):', 'Amor') || 'Amor';
      const endereco = prompt('Endereço (localizo automaticamente no mapa):', '') || '';
      let pos = { lat, lng };
      if (endereco) {
        const res = await geocode(endereco);
        if (res) pos = res; else alert('Não encontrei esse endereço, coloquei no centro do mapa — você pode arrastar depois no modo mapa.');
      }
      publicadoresData.push({ membros: nomes.split(',').map(s=>s.trim()), grupo, endereco, lat: pos.lat, lng: pos.lng });
      renderPublicadores();
    } else {
      const grupo = prompt('Nome do grupo:'); if (!grupo) return;
      const nomeCasa = prompt('Nome/referência da casa:', '') || '';
      saidasData.push({ grupo, nome: nomeCasa, cor: '#495057', lat, lng });
      renderGrupos();
    }
    renderList();
  }

  // ---------- Adicionar via lista (sem precisar tocar no mapa) ----------
  function addItemPrompt() {
    if (activeTab === 'quadras') {
      setViewMode('mapa');
      if (!editMode) toggleEditMode();
      startDrawQuadra();
      return;
    }
    // usa o centro atual do mapa como posição inicial; dá pra arrastar depois no modo mapa
    const c = map.getCenter();
    addNewItem(activeTab, c.lat, c.lng);
  }

  function locateMe() {
    map.locate({ setView: true, maxZoom: 18 });
  }
  map.on('locationfound', function(e) {
    L.marker(e.latlng).addTo(map).bindPopup('Você está aqui').openPopup();
  });
  map.on('locationerror', function(e) {
    alert('Não consegui pegar sua localização: ' + e.message);
  });

  // ---------- LISTA (edição direta em formulário) ----------
  function focusItem(item) {
    setViewMode('mapa');
    if (item._marker) {
      map.setView(item._marker.getLatLng(), 18);
      item._marker.openPopup();
    } else if (item._layer) {
      map.fitBounds(item._layer.getBounds(), { padding: [30, 30] });
      item._layer.openPopup();
    }
  }

  // marca o cartão como alterado e habilita o botão Salvar
  function wireDirty(card) {
    const saveBtn = card.querySelector('.btn-save-card');
    card.querySelectorAll('input, select').forEach(inp => {
      inp.addEventListener('input', () => { card.classList.add('dirty'); saveBtn.disabled = false; });
      inp.addEventListener('change', () => { card.classList.add('dirty'); saveBtn.disabled = false; });
    });
  }
  function finishSave(card) {
    card.classList.remove('dirty');
    const saveBtn = card.querySelector('.btn-save-card');
    saveBtn.disabled = true; saveBtn.textContent = '💾 Salvar';
  }

  // ---------- Barra de categorias (Comércios) / grupos (Publicadores) ----------
  function renderCatbar() {
    const box = document.getElementById('catbarInner');
    if (!box) return;

    if (activeTab === 'quadras') {
      const nums = {};
      quadrasData.forEach(qd => { if (!nums[qd.mapa]) nums[qd.mapa] = qd.cor || getColorForMapa(qd.mapa); });
      const sortedNums = Object.keys(nums).sort((a, b) => {
        const na = parseInt(a, 10), nb = parseInt(b, 10);
        if (!isNaN(na) && !isNaN(nb) && na !== nb) return na - nb;
        return a.localeCompare(b, 'pt-BR');
      });
      let html = `<button class="cat-chip${activeMapaFilter ? '' : ' active'}" data-mapa="">Todos <span class="count">${quadrasData.length}</span></button>`;
      sortedNums.forEach(n => {
        const count = quadrasData.filter(qd => qd.mapa === n).length;
        html += `<button class="cat-chip${activeMapaFilter === n ? ' active' : ''}" data-mapa="${n}"><span class="dot" style="background:${nums[n]}"></span>Mapa ${n} <span class="count">${count}</span></button>`;
      });
      box.innerHTML = html;
      box.querySelectorAll('.cat-chip').forEach(btn => {
        btn.onclick = () => {
          activeMapaFilter = btn.dataset.mapa || null;
          renderCatbar();
          renderQuadras();
          updateLegend();
          if (viewMode === 'lista') renderList();
          if (activeMapaFilter) {
            const matching = quadrasData.filter(qd => qd.mapa === activeMapaFilter && qd._layer);
            if (matching.length) {
              const group = L.featureGroup(matching.map(qd => qd._layer));
              map.fitBounds(group.getBounds(), { padding: [30, 30] });
            }
          }
        };
      });
      return;
    }

    if (activeTab === 'publicadores') {
      let html = `<button class="cat-chip${activeGroupFilter ? '' : ' active'}" data-grp="">Todos <span class="count">${publicadoresData.length}</span></button>`;
      Object.keys(groupColors).forEach(g => {
        const count = publicadoresData.filter(p => p.grupo === g).length;
        html += `<button class="cat-chip${activeGroupFilter === g ? ' active' : ''}" data-grp="${g}"><span class="dot" style="background:${groupColors[g]}"></span>${g} <span class="count">${count}</span></button>`;
      });
      box.innerHTML = html;
      box.querySelectorAll('.cat-chip').forEach(btn => {
        btn.onclick = () => {
          activeGroupFilter = btn.dataset.grp || null;
          renderCatbar();
          renderPublicadores();
          if (viewMode === 'lista') renderList();
        };
      });
      return;
    }

    const cats = {};
    comerciosData.forEach(c => { if (!cats[c.categoria]) cats[c.categoria] = c.cor || '#868e96'; });
    const catNames = Object.keys(cats).sort((a, b) => a.localeCompare(b, 'pt-BR'));
    let html = `<button class="cat-chip${activeCategoryFilter ? '' : ' active'}" data-cat="">Todas <span class="count">${comerciosData.length}</span></button>`;
    catNames.forEach(cat => {
      const count = comerciosData.filter(c => c.categoria === cat).length;
      html += `<button class="cat-chip${activeCategoryFilter === cat ? ' active' : ''}" data-cat="${cat}"><span class="dot" style="background:${cats[cat]}"></span>${cat} <span class="count">${count}</span></button>`;
    });
    box.innerHTML = html;
    box.querySelectorAll('.cat-chip').forEach(btn => {
      btn.onclick = () => {
        activeCategoryFilter = btn.dataset.cat || null;
        renderCatbar();
        renderComercios();
      };
    });
  }

  // ---------- Busca geral (Grupos + Comércios + Publicadores) ----------
  function openGlobalSearch() {
    document.getElementById('searchOverlay').classList.add('show');
    const input = document.getElementById('globalSearchInput');
    input.value = '';
    renderGlobalSearch();
    setTimeout(() => input.focus(), 50);
  }
  function closeGlobalSearch() {
    document.getElementById('searchOverlay').classList.remove('show');
  }
  function renderGlobalSearch() {
    const box = document.getElementById('globalSearchResults');
    const q = (document.getElementById('globalSearchInput').value || '').trim().toLowerCase();
    let results = [];
    saidasData.forEach(s => {
      const text = (s.grupo + ' ' + s.nome + ' ' + (s.endereco || '')).toLowerCase();
      if (!q || text.includes(q)) results.push({ badge: '📍', title: 'Grupo ' + s.grupo + ' — ' + s.nome, sub: s.endereco || '', tab: 'grupos', item: s });
    });
    comerciosData.forEach(c => {
      const text = (c.nome + ' ' + c.categoria + ' ' + c.endereco).toLowerCase();
      if (!q || text.includes(q)) results.push({ badge: '🏪', title: c.nome, sub: c.categoria + ' — ' + c.endereco, tab: 'comercios', item: c });
    });
    condominiosData.forEach(c => {
      const text = (c.nome + ' ' + c.endereco).toLowerCase();
      if (!q || text.includes(q)) results.push({ badge: '🏢', title: c.nome, sub: c.endereco, tab: 'condominios', item: c });
    });
    publicadoresData.forEach(p => {
      const text = (p.membros.join(' ') + ' ' + p.grupo + ' ' + (p.endereco || '')).toLowerCase();
      if (!q || text.includes(q)) results.push({ badge: '🏠', title: p.membros.join(', '), sub: 'Grupo ' + p.grupo + (p.endereco ? ' — ' + p.endereco : ''), tab: 'publicadores', item: p });
    });
    quadrasData.forEach(qd => {
      const text = ('mapa ' + qd.mapa + ' ' + (qd.nome || '')).toLowerCase();
      if (!q || text.includes(q)) results.push({ badge: '🧩', title: 'Mapa ' + qd.mapa + (qd.nome ? ' — ' + qd.nome : ''), sub: qd.coords.length + ' pontos no contorno', tab: 'quadras', item: qd });
    });
    if (!results.length) { box.innerHTML = '<div class="empty-msg">Nada encontrado</div>'; return; }
    box.innerHTML = '';
    results.slice(0, 200).forEach(r => {
      const div = document.createElement('div');
      div.className = 'search-result';
      div.innerHTML = `<span class="badge">${r.badge}</span><div class="info"><b>${r.title}</b><span>${r.sub}</span></div>`;
      div.onclick = () => {
        closeGlobalSearch();
        activeCategoryFilter = null;
        activeGroupFilter = null;
        activeMapaFilter = null;
        switchTab(r.tab);
        setTimeout(() => focusItem(r.item), 60);
      };
      box.appendChild(div);
    });
  }

          </div>

          s.grupo = card.querySelector('[data-f="grupo"]').value;
          s.nome = card.querySelector('[data-f="nome"]').value;

            saveBtn.textContent = 'Localizando...';

            else { statusEl.className = 'geo-status fail'; statusEl.textContent = '✗ Não encontrado — ajuste arrastando no mapa'; }

          <div class="card-label">Nomes da família</div>
          <div class="card-row"><input type="text" data-f="membros" value="${p.membros.join(', ')}" placeholder="Nomes (separados por vírgula)"></div>
          <div class="card-label">Grupo</div>
          <div class="card-row">
            <select data-f="grupo">
              ${Object.keys(groupColors).map(g => `<option value="${g}" ${g===p.grupo?'selected':''}>${g}</option>`).join('')}
            </select>
          </div>
          <div class="card-label">Endereço</div>
          <div class="card-row"><input type="text" data-f="endereco" value="${p.endereco || ''}" placeholder="Endereço"></div>
          <div class="geo-status" data-geo-status></div>
          <div class="card-actions">
            <button class="btn-save-card" disabled>💾 Salvar</button>
            <button class="btn-locate">🗺️ Ver no mapa</button>
            <button class="btn-remove">🗑️ Remover</button>
          </div>
        `;
        wireDirty(card);
        card.querySelector('.btn-save-card').onclick = async () => {
          const saveBtn = card.querySelector('.btn-save-card');
          const statusEl = card.querySelector('[data-geo-status]');
          saveBtn.disabled = true;
          p.membros = card.querySelector('[data-f="membros"]').value.split(',').map(s=>s.trim()).filter(Boolean);
          p.grupo = card.querySelector('[data-f="grupo"]').value;
          const novoEndereco = card.querySelector('[data-f="endereco"]').value;
          if (novoEndereco && novoEndereco !== p.endereco) {
            saveBtn.textContent = 'Localizando...';
            const res = await geocode(novoEndereco);
            if (res) { p.lat = res.lat; p.lng = res.lng; statusEl.className = 'geo-status ok'; statusEl.textContent = '✓ Endereço localizado no mapa'; }
            else { statusEl.className = 'geo-status fail'; statusEl.textContent = '✗ Não encontrado — ajuste arrastando no mapa'; }
          } else { statusEl.textContent = ''; }
          p.endereco = novoEndereco;
          renderPublicadores(); finishSave(card);
        };
        card.querySelector('.btn-locate').onclick = () => focusItem(p);
        card.querySelector('.btn-remove').onclick = () => {
          if (!confirm('Remover este publicador?')) return;
          const idx = publicadoresData.indexOf(p); if (idx > -1) publicadoresData.splice(idx, 1);
          renderPublicadores(); renderList();
        };
        box.appendChild(card);
      });
    }

    if (activeTab === 'quadras') {
      const base = activeMapaFilter ? quadrasData.filter(qd => qd.mapa === activeMapaFilter) : quadrasData;
      const items = base.filter(qd => !q || ('mapa ' + qd.mapa + ' ' + (qd.nome || '')).toLowerCase().includes(q));
      if (!items.length) { box.innerHTML = '<div class="empty-msg">Nenhuma quadra encontrada. Ative "✏️ Editar quadras" e toque em ➕ no mapa pra desenhar uma.</div>'; return; }
      items.forEach(qd => {
        const cor = qd.cor || getColorForMapa(qd.mapa);
        const weight = qd.weight || 3;
        const card = document.createElement('div');
        card.className = 'card';
        card.style.borderLeftColor = cor;
        card.innerHTML = `
          <div class="card-label">Número do mapa</div>
          <div class="card-row"><input type="text" data-f="mapa" value="${qd.mapa}" placeholder="Ex: 15"></div>
          <div class="card-label">Nome/observação (opcional)</div>
          <div class="card-row"><input type="text" data-f="nome" value="${qd.nome || ''}" placeholder="Ex: Quadra da praça"></div>
          <div class="card-label">Cor da quadra</div>
          <div class="card-row">
            <input type="color" data-f="cor" value="${cor}" style="flex:0 0 52px; padding:2px; height:38px; cursor:pointer">
            <button type="button" class="btn-cor-auto" style="flex-shrink:0;background:var(--bg);color:var(--ink-soft);border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:0.75rem;font-weight:600;cursor:pointer">🎨 Cor automática</button>
          </div>
          <div class="card-label">Espessura da linha (contorno)</div>
          <div class="card-row"><input type="number" data-f="weight" min="1" max="12" step="1" value="${weight}"></div>
          <div class="card-label" style="font-size:0.7rem;color:#999">${qd.coords.length} pontos no contorno</div>
          <div class="card-actions">
            <button class="btn-save-card" disabled>💾 Salvar</button>
            <button class="btn-locate">🗺️ Ver no mapa</button>
            <button class="btn-remove">🗑️ Remover</button>
          </div>
        `;
        wireDirty(card);
        card.querySelector('.btn-cor-auto').onclick = () => {
          card.querySelector('[data-f="cor"]').value = getColorForMapa(card.querySelector('[data-f="mapa"]').value.trim() || qd.mapa);
          card.classList.add('dirty');
          card.querySelector('.btn-save-card').disabled = false;
        };
        card.querySelector('.btn-save-card').onclick = () => {
          qd.mapa = card.querySelector('[data-f="mapa"]').value.trim();
          qd.nome = card.querySelector('[data-f="nome"]').value;
          qd.cor = card.querySelector('[data-f="cor"]').value;
          const w = parseInt(card.querySelector('[data-f="weight"]').value, 10);
          qd.weight = isNaN(w) ? 3 : Math.max(1, Math.min(12, w));
          renderQuadras(); renderCatbar(); updateLegend(); finishSave(card);
        };
        card.querySelector('.btn-locate').onclick = () => focusItem(qd);
        card.querySelector('.btn-remove').onclick = () => {
          if (!confirm('Remover esta quadra?')) return;
          const idx = quadrasData.indexOf(qd); if (idx > -1) quadrasData.splice(idx, 1);
          renderQuadras(); renderList(); renderCatbar(); updateLegend();
        };
        box.appendChild(card);
      });
    }
  }

  renderList();
</script>

</body>
</html>
